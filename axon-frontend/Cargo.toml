[package]
name = "axon-frontend"
version = "0.19.3"
edition = "2021"
rust-version = "1.95"
authors = ["AXON Project", "Bemarking AI S.A.S."]
description = "AXON compiler frontend — lexer, parser, AST, epistemic type system, type checker, IR generator. Zero runtime dependencies. v0.19.3 extends the Request Binding Contract source set from body-only to {path, query, body} — path placeholders `/api/{id}` extracted at parse time, inline `query: { name: Type }` block with closed catalog {Text, Int, Float, Bool, Uuid}, D3 totality over the union, new axon-T901 compile error when a name appears in 2+ sources (Fase 37.y). v0.19.2 closes IDENTITY recognition end-to-end at compile time (Fase 38.x.d). v0.19.0 the Declared & Compile-Time-Typed Store Schema (Fase 38). v0.18.0 Request Binding Contract totality (Fase 37). v0.17.0 `in_memory` axonstore (Fase 36.x). v0.12.0 wire-format adapter. v0.11.0 Fase 32 REST. v0.10.0 type-driven wire. v0.9.0 HTTP. v0.2.0–v0.8.0 earlier cycles."
license = "MIT"
repository = "https://github.com/Bemarking/axon-lang"
readme = "README.md"
keywords = ["axon", "compiler", "parser", "ast", "type-checker"]
categories = ["compilers", "development-tools"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
