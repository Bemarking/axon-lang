[package]
name = "axon-frontend"
version = "0.5.0"
edition = "2021"
rust-version = "1.95"
authors = ["AXON Project", "Bemarking AI S.A.S."]
description = "AXON compiler frontend — lexer, parser, AST, epistemic type system, type checker, IR generator, compile-time checker. Zero runtime dependencies. v0.5.0 ships IRReturn.value_kind for Fase 18.d return runtime wiring (parser preserves literal-vs-reference intent for return values, mirror of let). v0.4.0 closed Fase 17 (let runtime). v0.3.0 closed Fase 14 (lossless lexing). v0.2.0 added Fase 13 typed channels."
license = "MIT"
repository = "https://github.com/Bemarking/axon-lang"
readme = "README.md"
keywords = ["axon", "compiler", "parser", "ast", "type-checker"]
categories = ["compilers", "development-tools"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
