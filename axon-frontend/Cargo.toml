[package]
name = "axon-frontend"
version = "0.18.0"
edition = "2021"
rust-version = "1.95"
authors = ["AXON Project", "Bemarking AI S.A.S."]
description = "AXON compiler frontend — lexer, parser, AST, epistemic type system, type checker, IR generator. Zero runtime dependencies. v0.18.0 adds the Request Binding Contract totality check — an axonendpoint's `execute:` flow parameters must be covered by its `body:` type, proven at compile time (Fase 37). v0.17.0 adds `in_memory` to the axonstore backend catalog — the agent pattern runs with zero infrastructure (Fase 36.x). v0.12.0 ships Fase 33.z.k Wire-format adapter cycle: parametrized transport grammar `transport: sse(<dialect>)` + closed 5-dialect catalog AXONENDPOINT_TRANSPORT_DIALECTS `{axon, openai, kimi, glm, anthropic}` + resolve_effective_dialect resolver (Q1 default rules) + AxonEndpointDefinition.transport_dialect AST field. v0.11.0 Fase 32 Axonendpoint as First-Class HTTP REST. v0.10.0 Fase 31 Type-Driven Wire Inference. v0.9.0 Fase 30 HTTP transport. v0.2.0–v0.8.0 earlier compiler cycles."
license = "MIT"
repository = "https://github.com/Bemarking/axon-lang"
readme = "README.md"
keywords = ["axon", "compiler", "parser", "ast", "type-checker"]
categories = ["compilers", "development-tools"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
