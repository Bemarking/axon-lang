[package]
name = "axon-frontend"
version = "0.20.0"
edition = "2021"
rust-version = "1.95"
authors = ["AXON Project", "Bemarking AI S.A.S."]
description = "AXON compiler frontend — lexer, parser, AST, epistemic type system, type checker, IR generator. Zero runtime dependencies. v0.20.0 ships the Retrieve Cardinality vs Output Singularity Gate (Fase 38.x.e): a new compile-time `axon-T9XX retrieve_cardinality_mismatch` fires when a flow's tail is a `retrieve` step (always plural) but the executing axonendpoint declares `output: T` (singular). Adopters get an actionable hint at `axon check` instead of an opaque runtime D5 internal_validation_error. v0.19.3 extended the Request Binding Contract source set (Fase 37.y). v0.19.2 closed IDENTITY recognition at compile time (Fase 38.x.d). v0.19.0 the Declared & Compile-Time-Typed Store Schema (Fase 38). v0.18.0 Request Binding Contract totality (Fase 37). v0.17.0 `in_memory` axonstore (Fase 36.x). v0.12.0 wire-format adapter. v0.11.0 Fase 32 REST. v0.10.0 type-driven wire. v0.9.0 HTTP. v0.2.0–v0.8.0 earlier cycles."
license = "MIT"
repository = "https://github.com/Bemarking/axon-lang"
readme = "README.md"
keywords = ["axon", "compiler", "parser", "ast", "type-checker"]
categories = ["compilers", "development-tools"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
