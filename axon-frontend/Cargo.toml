[package]
name = "axon-frontend"
version = "0.8.0"
edition = "2021"
rust-version = "1.95"
authors = ["AXON Project", "Bemarking AI S.A.S."]
description = "AXON compiler frontend — lexer, parser, AST, epistemic type system, type checker, IR generator, compile-time checker. Zero runtime dependencies. v0.8.0 ships Fase 28 adopter diagnostic robustness: parser error recovery (parse_with_recovery → ParseResult), rustc-style source-context blocks (SourceSnippet), smart-suggest 'Did you mean X?' Levenshtein hints (smart_suggest module), cross-stack drift gate vs Python frontend. v0.7.0 Fase 23 algebraic effects runtime IR. v0.6.0 IRBreak/IRContinue. v0.5.0 IRReturn.value_kind. v0.4.0 closed Fase 17 (let). v0.3.0 closed Fase 14 (lossless lexing). v0.2.0 Fase 13 typed channels."
license = "MIT"
repository = "https://github.com/Bemarking/axon-lang"
readme = "README.md"
keywords = ["axon", "compiler", "parser", "ast", "type-checker"]
categories = ["compilers", "development-tools"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
