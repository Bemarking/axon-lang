[package]
name = "axon-frontend"
version = "0.11.0"
edition = "2021"
rust-version = "1.95"
authors = ["AXON Project", "Bemarking AI S.A.S."]
description = "AXON compiler frontend — lexer, parser, AST, epistemic type system, type checker, IR generator, compile-time checker. Zero runtime dependencies. v0.11.0 ships Fase 32 Axonendpoint as First-Class HTTP REST Primitive: `AxonEndpointDefinition.requires_capabilities` + `replay_explicit` + `replay` AST fields, parser support for `requires: [slug, slug.dotted]` (closed grammar `^[a-z][a-z0-9_]*(\\.[a-z][a-z0-9_]*)*$` with smart-suggest) + `replay: true | false`, `pub fn is_valid_capability_slug` shared with runtime. v0.10.0 ships Fase 31 Type-Driven Wire Inference: `implicit_transport(F, E)` inference function + `compute_implicit_transports` walker + `compute_implicit_transport_warnings` axon-W001 emitter. v0.9.0 Fase 30 HTTP transport surface (`transport:` + `keepalive:` fields). v0.8.0 Fase 28 adopter diagnostic robustness (parse_with_recovery → ParseResult, SourceSnippet, smart_suggest). v0.7.0 Fase 23 algebraic effects runtime IR. v0.6.0 IRBreak/IRContinue. v0.5.0 IRReturn.value_kind. v0.4.0 closed Fase 17 (let). v0.3.0 closed Fase 14 (lossless lexing). v0.2.0 Fase 13 typed channels."
license = "MIT"
repository = "https://github.com/Bemarking/axon-lang"
readme = "README.md"
keywords = ["axon", "compiler", "parser", "ast", "type-checker"]
categories = ["compilers", "development-tools"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
