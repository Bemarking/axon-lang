[package]
name = "axon-frontend"
version = "0.11.2"
edition = "2021"
rust-version = "1.95"
authors = ["AXON Project", "Bemarking AI S.A.S."]
description = "AXON compiler frontend — lexer, parser, AST, epistemic type system, type checker, IR generator. Zero runtime dependencies. v0.11.0 ships Fase 32 Axonendpoint as First-Class HTTP REST: AST `requires_capabilities` + `replay_explicit` + `replay` fields + parser support for `requires: [slug.dotted]` (closed slug grammar with smart-suggest) + `replay: true | false`. v0.10.0 Fase 31 Type-Driven Wire Inference. v0.9.0 Fase 30 HTTP transport. v0.8.0 Fase 28 parse_with_recovery + SourceSnippet + smart_suggest. v0.7.0 algebraic effects IR. v0.6.0 IRBreak/IRContinue. v0.5.0 IRReturn.value_kind. v0.4.0 let. v0.3.0 lossless lexing. v0.2.0 typed channels."
license = "MIT"
repository = "https://github.com/Bemarking/axon-lang"
readme = "README.md"
keywords = ["axon", "compiler", "parser", "ast", "type-checker"]
categories = ["compilers", "development-tools"]

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
