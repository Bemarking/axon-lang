[package]
name = "axon"
version = "1.3.1"
authors = ["AXON Project", "Bemarking AI S.A.S."]
edition = "2021"
description = "AXON v1.3.1 — Native Rust runtime with byte-identical parity vs Python reference; Cognitive I/O (§λ-L-E Fases 1-9) including component/view UI primitives with compile-time compliance"

[dependencies]
clap = { version = "4.5", features = ["derive"] }
reqwest = { version = "0.12", features = ["json", "blocking"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
axum = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["cors"] }
http-body-util = "0.1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "fmt", "env-filter"] }
tracing-appender = "0.2"
uuid = { version = "1", features = ["v4"] }
sqlx = { version = "0.8", features = ["runtime-tokio", "tls-rustls", "postgres", "json", "chrono", "migrate"] }
chrono = { version = "0.4", features = ["serde"] }
base64 = "0.22"
aws-config = { version = "1", features = ["behavior-version-latest"] }
aws-sdk-secretsmanager = "1"
# §λ-L-E Fase 5 — cognitive immune system needs SHA-256 + HMAC for signed traces.
sha2 = "0.10"
hmac = "0.12"
rand = "0.9"
# §ESK Fase 6.6 — deterministic ZIP bundle for the audit evidence packager.
zip = { version = "2", default-features = false, features = ["deflate"] }
# §Fase 10.e — JWT signature verification + JWKS client for the Rust
# tenant extractor. Closes the pre-10.e gap where `tenant.rs` extracted
# `tenant_id` from the JWT payload without checking the signature.
jsonwebtoken = "9"
# §Fase 11.a — Temporal Algebraic Effects + Trust Types.
# Ed25519 is the fourth member of the CLOSED trust catalog (alongside
# HMAC-SHA256, JWT signature, OAuth2 PKCE S256 code exchange). Any
# addition to the catalog requires a compiler PR + security review;
# writing your own `verify_signature` is rejected at compile time.
ed25519-dalek = { version = "2", features = ["rand_core"] }
subtle = "2"
urlencoding = "2"
