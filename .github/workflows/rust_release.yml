name: Rust Release Binaries

# §Fase 8.8 — Binary distribution for the native Rust `axon` runtime.
#
# Builds statically-linkable binaries for the three major platforms on
# every version tag, attaches them to the GitHub Release alongside
# SHA-256 checksums for tamper evidence. A separate WASM build produces
# `axon.wasm` as a bonus target for browser-side compilers.
#
# Tagging convention: `rust-v1.0.0` (the Rust crate version, NOT the
# Python `axon-lang` version) — keeps the two release trains independent.

on:
  push:
    tags:
      - "rust-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. rust-v1.0.0)"
        required: true
        default: "rust-v1.0.0"

permissions:
  contents: write

env:
  # Opt into Node.js 24 for every JavaScript action in this workflow.
  # GitHub will force Node 24 by default starting 2026-06-02 and remove
  # Node 20 from runners on 2026-09-16 (deprecation notice surfaced by
  # the runner on every job pre-2026-06). Setting the flag now means
  # the workflow keeps working through the transition without waiting
  # for each individual action (actions/checkout, docker/build-push,
  # softprops/action-gh-release, …) to ship a Node-24 major bump.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ────────────────────────────────────────────────────────────────
  # One matrix row per target platform. `musl` gives a fully static
  # Linux binary; macOS uses `universal2` so the same artefact runs
  # on both Intel and Apple Silicon.
  # ────────────────────────────────────────────────────────────────
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: axon-linux-x86_64
            binary: axon
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: axon-linux-aarch64
            binary: axon
            cross: true
          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: axon-macos-x86_64
            binary: axon
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: axon-macos-aarch64
            binary: axon
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: axon-windows-x86_64
            binary: axon.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tooling
        if: runner.os == 'Linux' && contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (aarch64 Linux)
        if: matrix.cross
        run: cargo install cross --locked

      - name: Cargo build (release)
        working-directory: axon-rs
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --bin axon --release --target ${{ matrix.target }}
          else
            cargo build --bin axon --release --target ${{ matrix.target }}
          fi

      - name: Run unit tests on the host target
        if: '!matrix.cross'
        working-directory: axon-rs
        # shell: bash because the `> /dev/null` redirect is a POSIX
        # construct — on the Windows runner PowerShell interprets it
        # as a literal path (D:\dev\null) and fails with OpenError.
        shell: bash
        run: cargo test --release --bin axon -- --list > /dev/null

      - name: Package artefact + SHA-256
        working-directory: axon-rs
        shell: bash
        run: |
          mkdir -p ../dist
          src="target/${{ matrix.target }}/release/${{ matrix.binary }}"
          dst="../dist/${{ matrix.artifact }}/${{ matrix.binary }}"
          mkdir -p "$(dirname "$dst")"
          cp "$src" "$dst"
          cd ../dist
          # Deterministic tarball for Unix, zip for Windows.
          if [ "${{ runner.os }}" = "Windows" ]; then
            powershell Compress-Archive -Path "${{ matrix.artifact }}/*" -DestinationPath "${{ matrix.artifact }}.zip"
            sha256sum "${{ matrix.artifact }}.zip" > "${{ matrix.artifact }}.zip.sha256"
          else
            tar -C "${{ matrix.artifact }}" -czf "${{ matrix.artifact }}.tar.gz" .
            sha256sum "${{ matrix.artifact }}.tar.gz" > "${{ matrix.artifact }}.tar.gz.sha256"
          fi

      - name: Upload artefact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.*
          retention-days: 90

  # ────────────────────────────────────────────────────────────────
  # Optional WASM build — compiles the crate to wasm32-wasip1 (formerly
  # wasm32-wasi; the target was renamed in Rust 1.84) so the Axon
  # compiler can be embedded in browser-side tools.
  #
  # Job-level `continue-on-error: true` so a wasm failure does not
  # propagate to the workflow's overall conclusion. Historically this
  # job was failing on the toolchain-install step (target name had been
  # changed upstream), which marked the entire `Rust Release Binaries`
  # workflow as `failed` even though the five real platform binaries
  # (linux x2 + macos x2 + windows) had been built and published. The
  # downstream `Enterprise Release` workflow only depends on
  # axon-linux-x86_64, so a wasm failure must not block enterprise
  # ECR builds.
  # ────────────────────────────────────────────────────────────────
  wasm:
    name: wasm32-wasip1
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
      - name: Cargo build (release, wasm32-wasip1)
        working-directory: axon-rs
        run: cargo build --bin axon --release --target wasm32-wasip1
      - name: Upload wasm artefact
        uses: actions/upload-artifact@v4
        with:
          name: axon-wasm32-wasip1
          path: axon-rs/target/wasm32-wasip1/release/axon.wasm
          if-no-files-found: warn
          retention-days: 90

  # ────────────────────────────────────────────────────────────────
  # Assemble everything into the GitHub Release.
  # ────────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build]
    # Run even if some matrix rows fail so the release can still
    # publish whatever artefacts succeeded. The downstream Dockerfile
    # in axon-enterprise only consumes `axon-linux-x86_64.tar.gz`; the
    # other platforms are opportunistic. The final guard in
    # "Require linux-x86_64 artefact" fails the job if the minimum
    # tarball is missing.
    if: |
      always() &&
      startsWith(github.ref, 'refs/tags/rust-v') &&
      needs.build.result != 'cancelled'
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artefacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artefact tree
        run: |
          mkdir -p release-bundle
          find dist -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} release-bundle/ \;
          ls -la release-bundle

      - name: Require linux-x86_64 artefact
        run: |
          set -euo pipefail
          if [ ! -f release-bundle/axon-linux-x86_64.tar.gz ]; then
            echo "linux-x86_64 tarball missing — the axon-enterprise Dockerfile requires it. Aborting release." >&2
            exit 1
          fi

      - name: Resolve Python release tag
        id: pyrel
        run: |
          set -euo pipefail
          # rust-vX.Y.Z → vX.Y.Z: the Rust binary attaches to the same
          # GitHub Release as the Python package (one release per
          # axon-lang version, consumed unchanged by Dockerfile.enterprise
          # in axon-enterprise via the stable v${AXON_VERSION} URL).
          REF="${GITHUB_REF#refs/tags/}"
          VER="${REF#rust-v}"
          echo "tag=v${VER}" >> "$GITHUB_OUTPUT"
          echo "Attaching binaries to existing release v${VER}"

      - name: Attach binaries to Python release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.pyrel.outputs.tag }}
          files: release-bundle/*
