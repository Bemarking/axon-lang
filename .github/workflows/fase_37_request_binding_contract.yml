name: Fase 37 — The Request Binding Contract

# §Fase 37.h (D7, D5) — Dedicated CI workflow exercising the full
# Request Binding Contract surface on every PR + master push. D1–D7
# ratificadas 2026-05-18; this workflow locks the contract — the
# typed request body of an `axonendpoint` populates the parameters of
# its `execute:` flow, a binding the compiler proves TOTAL, the
# runtime delivers on both transports, and the epistemic layer treats
# as `Untrusted` so it reaches a store only as a bound parameter — at
# PR time so the gap report's defect class (a parameterised agent
# flow whose `${param}` interpolates to the literal because the
# request body is discarded) can never regress into a release.
#
# Four parallel lanes:
#
#   1. rust-frontend — the compile-time half: the D2 totality check
#      (`fase37_c` — an uncovered required parameter is a compile
#      error) + the D2 totality property/fuzz (`fase37_g` totality).
#
#   2. rust-runtime — the runtime half end-to-end: the diagnostic
#      anchor (37.a), the runtime binding on both transports (37.b),
#      injection-safe `${name}` filter resolution (37.d), honest
#      streaming failure (37.e), the agent-flow E2E (37.f), and the
#      `request_binding` lib unit pack.
#
#   3. fuzz-d3 — the ~4 800-iteration deterministic property pass
#      over `bind_request_body` (total + D4) and `build_pg_where`
#      `${name}` resolution (injection resistance — the clause
#      structure is template-determined, no value text leaks).
#
#   4. regression — D5: the streaming / store / endpoint surfaces
#      Fase 37 touches (Fase 33/34 streaming, Fase 35 axonstore
#      filter, Fase 36/36.x dynamic routes) must not regress. The
#      Request Binding Contract is purely additive — every prior
#      wire is byte-identical for a flow that does not error.

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── 1. Frontend lane: the compile-time totality theorem ─────────────
  rust-frontend:
    name: Rust frontend — D2 binding totality (Fase 37.c/g)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-frontend/target
          key: ${{ runner.os }}-cargo-fase37-frontend-${{ hashFiles('axon-frontend/Cargo.lock', 'axon-frontend/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase37-frontend-

      - name: Fase 37.c — endpoint→flow→parameter totality (compile error)
        working-directory: axon-frontend
        run: cargo test --test fase37_c_binding_totality -- --nocapture

      - name: Fase 37.g — D2 totality property/fuzz (800 iters)
        working-directory: axon-frontend
        run: cargo test --test fase37_g_totality_fuzz -- --nocapture

  # ── 2. Runtime lane: the full Request Binding Contract surface ──────
  rust-runtime:
    name: Rust runtime — full Fase 37 request-binding surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-fase37-runtime-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase37-runtime-

      - name: Fase 37.a — request-binding diagnostic anchor
        working-directory: axon-rs
        run: cargo test --test fase37_a_request_binding_diagnostic -- --nocapture

      - name: Fase 37.b — the runtime binding (SSE + JSON transports)
        working-directory: axon-rs
        run: cargo test --test fase37_b_request_binding -- --nocapture

      - name: Fase 37.b — bind_request_body lib unit pack
        working-directory: axon-rs
        run: cargo test --lib request_binding -- --nocapture

      - name: Fase 37.d — injection-safe ${name} filter resolution
        working-directory: axon-rs
        run: cargo test --test fase37_d_filter_injection -- --nocapture

      - name: Fase 37.e — honest streaming failure (all dialects)
        working-directory: axon-rs
        run: cargo test --test fase37_e_honest_streaming_error -- --nocapture

      - name: Fase 37.f — agent-flow E2E (the full contract)
        working-directory: axon-rs
        run: cargo test --test fase37_f_agent_flow_e2e -- --nocapture

  # ── 3. D3 fuzz lane: the injection-resistance property pass ─────────
  fuzz-d3:
    name: Fase 37.g — request-binding D3 fuzz (~4 800 iters)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-fase37-fuzz-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase37-fuzz-

      - name: Fase 37.g — bind_request_body + build_pg_where fuzz
        working-directory: axon-rs
        run: cargo test --test fase37_g_request_binding_fuzz -- --nocapture

  # ── 4. Regression lane: D5 — no prior surface regresses ─────────────
  #
  # Fase 37 threads the request body through the streaming dispatcher
  # + the synchronous runner + the filter compiler. D5 is absolute —
  # every Fase 33/34 streaming wire, every Fase 35 axonstore filter,
  # every Fase 36/36.x dynamic route must be preserved.
  regression:
    name: Fase 33/34/35/36 regression (D5 — Fase 37 must not regress)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-fase37-regression-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase37-regression-

      - name: Fase 35 axonstore — filter compiler + store fuzz
        working-directory: axon-rs
        run: |
          cargo test --lib store:: -- --nocapture
          cargo test --test fase35_fuzz -- --nocapture

      - name: Fase 33/34 streaming dispatcher + wire dialects
        working-directory: axon-rs
        run: |
          cargo test --test fase33_b_stub_steps_executed_anchor -- --nocapture
          cargo test --test fase33z_c_default_on_and_tool_call -- --nocapture
          cargo test --test fase33z_k_h_metadata_population -- --nocapture
          cargo test --test fase34_a_unified_stream_handler_diagnostic -- --nocapture

      - name: Fase 36/36.x dynamic routes + mixed-flow streaming
        working-directory: axon-rs
        run: |
          cargo test --test fase36_f_dynamic_handler_resolution -- --nocapture
          cargo test --test fase36x_d_mixed_flow_streaming -- --nocapture
          cargo test --test fase36x_e_data_flow_integrity -- --nocapture
          cargo test --test fase36x_f_terminator_fuzz -- --nocapture
