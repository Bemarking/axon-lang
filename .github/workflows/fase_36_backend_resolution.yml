name: Fase 36 — Axonendpoint Production Execution

# §Fase 36.l (D12) — Dedicated CI workflow exercising the full Backend
# Resolution Contract surface on every PR + master push. D1–D12
# ratificadas 2026-05-17; this workflow locks the contract — the
# resolution ladder, the closed catalog, honest failure, observability,
# the deploy/compile signalling, and the D12 fuzz pass — at PR time so
# the gap report's defect class (a deployed axonendpoint silently
# running the no-op `stub`) can never regress into a release.
#
# Four parallel lanes:
#
#   1. rust-frontend — the `axonendpoint backend:` declaration:
#      parser + closed-catalog validation (36.d), the cross-stack
#      catalog drift gate, and the `axon-W003` no-backend compile
#      warning (36.k).
#
#   2. rust-runtime — every runtime surface end-to-end through the
#      real `dynamic_endpoint_handler`: the diagnostic anchor (36.a),
#      env-aware `auto` (36.c), route backend + deploy (36.e),
#      handler resolution (36.f), server default (36.g), honest
#      failure (36.h), tool registry wiring (36.i), observability
#      (36.j), deploy/compile signalling (36.k), the D9 corpus +
#      the real-backend E2E capstone (36.l).
#
#   3. fuzz-d12 — the 20 000-iteration deterministic property pass
#      over `resolve_backend`: total, deterministic, never-`stub`-
#      from-the-auto-rungs, closed reason catalog.
#
#   4. regression — Fase 32/33/34 surfaces Fase 36 touches
#      (dynamic-route transport, idempotency, replay, the streaming
#      dispatcher, the sync/async parity gates). D9 absolute: the
#      Backend Resolution Contract must not regress any prior wire.

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── 1. Frontend lane: the `backend:` declaration ────────────────────
  rust-frontend:
    name: Rust frontend — axonendpoint backend declaration (Fase 36.d/k)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-frontend/target
          key: ${{ runner.os }}-cargo-fase36-frontend-${{ hashFiles('axon-frontend/Cargo.lock', 'axon-frontend/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase36-frontend-

      - name: Fase 36.d — `axonendpoint backend:` field (parser + type-checker)
        working-directory: axon-frontend
        run: cargo test --test fase36_d_axonendpoint_backend_field -- --nocapture

      - name: Fase 36.k — `axon-W003` no-backend compile warning
        working-directory: axon-frontend
        run: cargo test --test fase36_k_no_backend_warning -- --nocapture

  # ── 2. Runtime lane: full Backend Resolution Contract surface ───────
  rust-runtime:
    name: Rust runtime — full Fase 36 backend-resolution surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-fase36-runtime-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase36-runtime-

      - name: Fase 36.a — backend-gap diagnostic anchor
        working-directory: axon-rs
        run: cargo test --test fase36_a_axonendpoint_backend_gap_diagnostic -- --nocapture

      - name: Fase 36.b — resolve_backend contract (lib unit pack)
        working-directory: axon-rs
        run: cargo test --lib backend_resolution -- --nocapture

      - name: Fase 36.d — cross-stack backend-catalog drift gate
        working-directory: axon-rs
        run: cargo test --test fase36_d_backend_catalog_drift -- --nocapture

      - name: Fase 36.e — DynamicEndpointRoute.backend + deploy handler
        working-directory: axon-rs
        run: cargo test --test fase36_e_route_backend_deploy -- --nocapture

      - name: Fase 36.f — dynamic_endpoint_handler resolution
        working-directory: axon-rs
        run: cargo test --test fase36_f_dynamic_handler_resolution -- --nocapture

      - name: Fase 36.g — server default backend
        working-directory: axon-rs
        run: cargo test --test fase36_g_server_default_backend -- --nocapture

      - name: Fase 36.h — no-silent-stub honest failure
        working-directory: axon-rs
        run: cargo test --test fase36_h_honest_failure -- --nocapture

      - name: Fase 36.i — tool registry wired + per-step provider
        working-directory: axon-rs
        run: cargo test --test fase36_i_tool_registry_wired -- --nocapture

      - name: Fase 36.j — resolution observability
        working-directory: axon-rs
        run: cargo test --test fase36_j_resolution_observability -- --nocapture

      - name: Fase 36.k — deploy + compile signalling
        working-directory: axon-rs
        run: cargo test --test fase36_k_deploy_signalling -- --nocapture

      - name: Fase 36.l — D9 backwards-compat corpus + real-backend E2E
        working-directory: axon-rs
        run: |
          cargo test --test fase36_l_d9_corpus -- --nocapture
          cargo test --test fase36_l_e2e -- --nocapture

  # ── 3. D12 fuzz lane: the resolver property pass ────────────────────
  fuzz-d12:
    name: Fase 36.l — resolve_backend D12 fuzz (20 000 iters)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-fase36-fuzz-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase36-fuzz-

      - name: Fase 36.l — resolver fuzz (total + deterministic + D5)
        working-directory: axon-rs
        run: cargo test --test fase36_l_resolver_fuzz -- --nocapture

  # ── 4. Regression lane: D9 — no prior surface regresses ─────────────
  #
  # Fase 36 rewires `dynamic_endpoint_handler` + `run_streaming_via_
  # dispatcher`. D9 is absolute — every Fase 32/33/34 wire must be
  # preserved. This lane pins the contract explicitly at PR time.
  regression:
    name: Fase 32/33/34 regression (D9 — Fase 36 must not regress)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-fase36-regression-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase36-regression-

      - name: Fase 32 dynamic-route surface (routes / transport / idempotency / replay)
        working-directory: axon-rs
        run: |
          cargo test --test fase32_routes_drift -- --nocapture
          cargo test --test fase32_dynamic_transport -- --nocapture
          cargo test --test fase32_idempotency -- --nocapture
          cargo test --test fase32_replay_binding -- --nocapture
          cargo test --test fase32_output_schema -- --nocapture

      - name: Fase 33/34 streaming dispatcher + sync/async parity gates
        working-directory: axon-rs
        run: |
          cargo test --test fase33_b_stub_steps_executed_anchor -- --nocapture
          cargo test --test fase33z_c_default_on_and_tool_call -- --nocapture
          cargo test --test fase33z_e_parity_gate -- --nocapture
          cargo test --test fase34_d_dispatcher_arm -- --nocapture
          cargo test --test fase34_g_convergence -- --nocapture
