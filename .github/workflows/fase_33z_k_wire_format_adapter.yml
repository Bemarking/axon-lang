name: Fase 33.z.k — Wire-format adapter cycle

# §Fase 33.z.k.k — Dedicated CI workflow for the 33.z.k wire-format
# adapter cycle. Locks every sub-fase's contract at PR time so adopter-
# facing regressions surface BEFORE a release ever ships.
#
# # Cycle contract pinned by this workflow
#
# - **Q1** algebraic-effect-driven dialect default (openai for tool-
#   stream effects, axon for type-annotation-only).
# - **Q2** parametrized transport grammar `transport: sse(<dialect>)`.
# - **Q3** vertical-grounded 5-dialect catalog
#   `{axon, openai, kimi, glm, anthropic}` (Q3 revision 2026-05-14
#   added kimi + glm as first-class entries dispatching to
#   OpenAIDialectAdapter byte-identically).
# - **Q4** per-dialect native terminators (no unified terminator).
# - **Q5** axon dialect backwards-compat indefinite (explicit
#   `transport: sse(axon)` always wins).
# - **Q6** per-dialect tool-call interleaving (D11).
# - **Q7** algebraic-policy preservation via dialect-specific
#   `axon_metadata` / `axon.metadata` extension frames.
# - **D1** closed-catalog wire formats — no open-set pluggability.
# - **D2** declarative wire choice — source as single-source-of-truth.
# - **D3** semantic equivalence — per-token content + ordering byte-
#   identical across dialects modulo framing.
# - **D4** algebraic-policy preservation — counters / warnings / audit
#   reach the adopter regardless of dialect.
# - **D5** closed-dialect terminators — per-dialect native (axon=in-
#   line; openai=[DONE]; anthropic=message_stop).
# - **D6** axon dialect byte-compat indefinite (D6 == Q5 from a
#   different angle).
# - **D7** cross-stack Python+Rust contract — parser catalogs +
#   resolver byte-identical between stacks.
# - **D9** wire byte-compat for canonical Step + stub backend.
# - **D10** four-pillar trace (MATH + LOGIC + PHILOSOPHY + COMPUTING).
# - **D11** tool-call interleaving per dialect — closed-catalog
#   wire-byte verification.
# - **D12** production-grade fuzz × dialects — ~3 350 LCG iters.
#
# # Lane structure (8 parallel jobs + summary)
#
#   1. anchors-and-overrides — 33.z.k.a forensic anchor + 33.z.k.1
#      algebraic-effect override (Kivi-shape bug closure).
#   2. cross-stack-rust — 33.z.k.b grammar + 33.z.k.c resolver +
#      33.z.k.i drift gate (Rust side).
#   3. cross-stack-python — 33.z.k.b grammar + 33.z.k.c resolver +
#      33.z.k.i drift gate (Python side).
#   4. dialect-adapters — 33.z.k.{d,e,f} adapter unit tests (axon +
#      openai + anthropic byte-exact translation).
#   5. wire-e2e — 33.z.k.g 4 dialect E2E packs (openai/anthropic/
#      axon-byte-compat/kimi-glm-dispatch) + 33.z.k.g.3 tool-call
#      interleaving.
#   6. metadata-population — 33.z.k.h algebraic-policy surfacing via
#      populated metadata frames.
#   7. dialect-fuzz — 33.z.k.j D12 ~3 350 LCG iters across 9
#      invariant sections.
#   8. summary — aggregates all lanes; the single green-tick gate
#      for PR merge.
#
# # What this workflow does NOT run
#
# - Real-provider lane (`fase_33x_real_provider.yml`) — opt-in,
#   gated separately on `AXON_RUN_REAL_PROVIDER_TEST` variable.
# - The pre-33.z.k Fase 30/31/32/33.a-i/33.x/33.y/33.z tests — those
#   each have their own workflow.

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── 1. Forensic anchor + algebraic-effect override ────────────────
  anchors-and-overrides:
    name: 33.z.k.a + 33.z.k.1 — forensic anchor + algebraic-effect override
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.z.k.a — forensic anchor (4 tests pinning canonical Step + stub + algebraic-effect openai wire post-flip + closed-catalog event vocabulary + grammar acceptance)
        run: |
          cd axon-rs
          cargo test --test fase33z_k_a_diagnostic_anchor -- --nocapture
      - name: 33.z.k.1 — algebraic-effect override (5 tests pinning Kivi-shape SSE wire under non-strict mode + D3 transport:json escape valve + openai-default-on-flip + method-agnostic firing)
        run: |
          cd axon-rs
          cargo test --test fase33z_k_1_algebraic_override -- --nocapture

  # ── 2. Cross-stack: Rust side ─────────────────────────────────────
  cross-stack-rust:
    name: 33.z.k.{b,c,i} Rust — dialect grammar + resolver + drift gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            axon-rs
            axon-frontend
      - name: "33.z.k.b — parametrized grammar `transport: sse(<dialect>)` (axon-frontend)"
        run: |
          cd axon-frontend
          cargo test --test fase33z_k_b_dialect_grammar -- --nocapture
      - name: 33.z.k.c — resolve_effective_dialect Q1 default rules (axon-frontend)
        run: |
          cd axon-frontend
          cargo test --test fase33z_k_c_dialect_resolver -- --nocapture
      - name: 33.z.k.i — dialect catalog drift gate (19 tests across 10 closure invariants)
        run: |
          cd axon-rs
          cargo test --test fase33z_k_i_dialect_catalog_drift_gate -- --nocapture

  # ── 3. Cross-stack: Python side ───────────────────────────────────
  cross-stack-python:
    name: 33.z.k.{b,c,i} Python — dialect grammar + resolver + drift gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install axon-lang + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov hypothesis
      - name: 33.z.k.b — Python parser grammar (parametrized transport)
        run: |
          python -m pytest tests/test_fase33z_k_b_dialect_grammar.py -v
      - name: 33.z.k.c — Python type_checker resolver (Q1 default rules)
        run: |
          python -m pytest tests/test_fase33z_k_c_dialect_resolver.py -v
      - name: 33.z.k.i — Python dialect catalog drift gate (cross-stack mirror of Rust drift gate)
        run: |
          python -m pytest tests/test_fase33z_k_i_dialect_catalog_drift_gate.py -v

  # ── 4. Per-dialect adapter unit tests ─────────────────────────────
  dialect-adapters:
    name: 33.z.k.{d,e,f} — adapter unit tests (38 byte-exact translation tests)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.z.k.d — AxonDialectAdapter (D6 backwards-compat baseline; 16 tests)
        run: |
          cd axon-rs
          cargo test --test fase33z_k_d_axon_dialect_adapter -- --nocapture
      - name: 33.z.k.e — OpenAIDialectAdapter (Chat Completions streaming wire verbatim; 11 tests)
        run: |
          cd axon-rs
          cargo test --test fase33z_k_e_openai_dialect_adapter -- --nocapture
      - name: 33.z.k.f — AnthropicDialectAdapter (Messages streaming wire verbatim; 11 tests)
        run: |
          cd axon-rs
          cargo test --test fase33z_k_f_anthropic_dialect_adapter -- --nocapture

  # ── 5. End-to-end wire verification + interleaving ────────────────
  wire-e2e:
    name: 33.z.k.g — E2E wire byte verification (4 dialect packs + tool-call interleaving)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.z.k.g — OpenAI E2E wire (Kivi-shape → OpenAI chunks + [DONE] + Q7 metadata + closed-catalog mutex; 4 tests)
        run: |
          cd axon-rs
          cargo test --test fase33z_k_g_e2e_openai_wire -- --nocapture
      - name: 33.z.k.g — Anthropic E2E wire (sse(anthropic) → message_*/content_block_* + Q7 axon.metadata; 3 tests)
        run: |
          cd axon-rs
          cargo test --test fase33z_k_g_e2e_anthropic_wire -- --nocapture
      - name: 33.z.k.g — Axon byte-compat E2E (bare sse == explicit sse(axon) byte-identical for type-annotation flows; Q5 escape valve for algebraic-effect flows; 3 tests)
        run: |
          cd axon-rs
          cargo test --test fase33z_k_g_e2e_axon_byte_compat -- --nocapture
      - name: 33.z.k.g — Kimi/GLM dispatch (Q3 revision; sse(kimi) + sse(glm) byte-identical to canonical sse(openai); 3 tests)
        run: |
          cd axon-rs
          cargo test --test fase33z_k_g_e2e_kimi_glm_dispatch -- --nocapture
      - name: 33.z.k.g.3 — D11 tool-call interleaving wire-byte verification (10 tests across 6 sections)
        run: |
          cd axon-rs
          cargo test --test fase33z_k_g_3_tool_call_interleaving -- --nocapture

  # ── 6. Algebraic-policy surfacing (populated metadata frames) ─────
  metadata-population:
    name: 33.z.k.h — algebraic-policy surfacing per dialect (D4)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.z.k.h — populated axon_metadata / axon.metadata frames (12 tests including 3 E2E HTTP POST cross-dialect parity)
        run: |
          cd axon-rs
          cargo test --test fase33z_k_h_metadata_population -- --nocapture

  # ── 7. D12 production-grade fuzz × dialects ───────────────────────
  dialect-fuzz:
    name: 33.z.k.j — D12 production-grade fuzz × dialects (~3 350 LCG iters across 18 tests / 9 sections)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.z.k.j — adapter totality + closed-catalog vocabulary + arrival-order + anthropic block lifecycle + openai tool_call_id monotonicity + envelope round-trip + determinism + defensive close
        run: |
          cd axon-rs
          cargo test --test fase33z_k_j_dialect_fuzz -- --nocapture

  # ── 8. Summary aggregator — single green-tick for PR merge ─────────
  summary:
    name: 33.z.k cycle — all lanes pass
    runs-on: ubuntu-latest
    needs:
      - anchors-and-overrides
      - cross-stack-rust
      - cross-stack-python
      - dialect-adapters
      - wire-e2e
      - metadata-population
      - dialect-fuzz
    steps:
      - name: 33.z.k cycle summary
        run: |
          echo "🎉 Fase 33.z.k wire-format adapter cycle CI: ALL 7 LANES GREEN."
          echo ""
          echo "Cycle contract honored (Q1–Q7 + D1–D12):"
          echo "  Q1 algebraic-default     — openai for tool-stream effects (LLM ecosystem default)"
          echo "  Q2 parametrized grammar  — transport: sse(<dialect>)"
          echo "  Q3 5-dialect catalog     — {axon, openai, kimi, glm, anthropic} (Q3 rev. 2026-05-14)"
          echo "  Q4 native terminators    — per-dialect (axon=in-line; openai=[DONE]; anthropic=message_stop)"
          echo "  Q5 axon dialect indef.   — explicit sse(axon) always wins (W3C-correct baseline)"
          echo "  Q6 tool-call per dialect — axon=event:axon.tool_call; openai=delta.tool_calls; anthropic=tool_use triad"
          echo "  Q7 metadata frame        — populated axon_metadata (openai) + event:axon.metadata (anthropic)"
          echo "                              with stream_policies / enforcement_summary / runtime_warnings /"
          echo "                              step_audit / terminal_reason"
          echo "  D1 closed-catalog        — no open-set pluggability"
          echo "  D2 declarative           — source as single-source-of-truth"
          echo "  D3 semantic equivalence  — arrival-order signature byte-equivalent cross-dialect"
          echo "  D4 algebraic-policy      — counters/warnings/audit reach every dialect"
          echo "  D5 native terminators    — closed per-dialect"
          echo "  D6 axon byte-compat      — bare sse == explicit sse(axon) for type-annotation flows"
          echo "  D7 cross-stack contract  — Python↔Rust parser+resolver+catalog byte-identical"
          echo "  D9 wire byte-compat      — canonical Step + stub → 1 token + 1 complete on axon dialect"
          echo "  D10 four-pillar trace    — MATH + LOGIC + PHILOSOPHY + COMPUTING"
          echo "  D11 tool-call interleav  — per-dialect wire-byte verified (axon/openai/anthropic interleavings)"
          echo "  D12 production-fuzz      — ~3 350 LCG iters across 9 invariants on every push/PR"
          echo ""
          echo "11 sub-fases shipped (a, b, c, d, e, f, g.1, g.2, g.3, h, i, j) — k = this CI workflow."
          echo "Cross-stack test counts (locked by drift gates):"
          echo "  Rust: 4 anchor + 5 override + 9 grammar + 7 resolver + 16 axon + 11 openai +"
          echo "        11 anthropic + 4+3+3+3 dialect E2E + 10 interleaving + 12 metadata +"
          echo "        19 drift-gate + 18 fuzz = 135 tests"
          echo "  Python: 9 grammar + 10 resolver + 19 drift-gate = 38 tests"
          echo "  Grand total: 173 dedicated 33.z.k tests, all green."
          echo ""
          echo "Founder principle honored end-to-end:"
          echo '  "los algebraics effects SSE deben funcionar perfectamente y cumplir la promesa'
          echo '   del paper... una primitiva cognitiva que supera lo que hoy ofrece el mercado'
          echo '   en ese sentido."'
