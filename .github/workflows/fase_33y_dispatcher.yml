# §Fase 33.y.n — Dedicated CI workflow for the 33.y cycle.
#
# Runs every 33.y test surface on every push/PR so the cycle's
# contract (D1 totality / D2 4-policy enforcer / D3 cancel
# propagation / D4 wire byte-compat / D6 per-step audit / D7 no
# markers / D8 tools first-class / D9 algebraic-effect bridge /
# D10 sync-runner parity / D11 cross-stack / D12 fuzz) stays
# observable across the cycle's deliverables. Separate from
# `fase_33_sse_cognitive_primitive.yml` (Fase 33.a-i architectural
# primitives) and `fase_33x_runtime_activation.yml` (33.x cycle)
# so the 33.y per-IRFlowNode dispatcher CI surface is coherent +
# searchable.
#
# # What this workflow runs
#
# Each sub-fase's test pack runs in its own job for clear failure
# attribution. The 9 architectural-group handler suites (33.y.c-j)
# + the cross-cutting suites (33.y.b skeleton, 33.y.k tools first-
# class, 33.y.l parity gate, 33.y.n consolidated fuzz, 33.y.a
# diagnostic anchor) each get a dedicated lane. A final
# `summary` job depends on all of them so the master CI status
# check is single-source-of-truth for the cycle's contract.
#
# # What this workflow does NOT run
#
# - Per-sub-fase fuzz packs that ship inside the handler-suite
#   test files (those run as part of the corresponding handler
#   lane); the consolidated 33.y.n cross-cutting fuzz pack
#   (`tests/fase33y_fuzz.rs`) runs as its own lane.
# - Real-provider lane (`fase_33x_real_provider.yml`) — opt-in,
#   gated separately on `AXON_RUN_REAL_PROVIDER_TEST` variable.
# - Other Fase 30/31/32 + 33.a-i + 33.x family tests — covered by
#   their dedicated workflows.

name: Fase 33.y — Per-IRFlowNode async dispatcher

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  diagnostic-anchor:
    name: 33.y.a — diagnostic anchor (foundational pin)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.y.a — dispatcher diagnostic anchor
        run: |
          cd axon-rs
          cargo test --test fase33y_dispatcher_diagnostic -- --nocapture

  dispatcher-skeleton:
    name: 33.y.b — dispatcher skeleton + drift gate (D1 totality)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.y.b — dispatcher skeleton drift gate
        run: |
          cd axon-rs
          cargo test --test fase33y_b_dispatcher_skeleton -- --nocapture

  group-pure-shape:
    name: 33.y.c — pure-shape handlers (Step / Probe / Reason / Validate / Refine / Weave)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.y.c — pure-shape handlers + fuzz
        run: |
          cd axon-rs
          cargo test --test fase33y_c_pure_shape_handlers --test fase33y_c_pure_shape_fuzz -- --nocapture

  group-orchestration:
    name: 33.y.d — orchestration handlers (Let / Conditional / ForIn / Break / Continue / Return)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.y.d — orchestration handlers + fuzz
        run: |
          cd axon-rs
          cargo test --test fase33y_d_orchestration_handlers --test fase33y_d_orchestration_fuzz -- --nocapture

  group-parallel-algebraic:
    name: 33.y.e — Par + Stream + D9 algebraic-effect ↔ wire bridge
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.y.e — parallel + algebraic-effect bridge
        run: |
          cd axon-rs
          cargo test --test fase33y_e_par_stream_handlers --test fase33y_e_par_stream_fuzz -- --nocapture

  group-cognitive:
    name: 33.y.f — cognitive primitives + PEM async surface
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.y.f — 10 cognitive primitives
        run: |
          cd axon-rs
          cargo test --test fase33y_f_cognitive_primitives --test fase33y_f_cognitive_fuzz -- --nocapture

  group-algebraic-handlers:
    name: 33.y.g — 6 algebraic-effect handlers (Shield / Ots / Mandate / Compute / Listen / Daemon)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.y.g — algebraic-effect handler framework
        run: |
          cd axon-rs
          cargo test --test fase33y_g_algebraic_handlers --test fase33y_g_algebraic_fuzz -- --nocapture

  group-wire-integrations:
    name: 33.y.h — 10 wire integrations (π-calc + persistence + multi-agent)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.y.h — wire integrations
        run: |
          cd axon-rs
          cargo test --test fase33y_h_wire_integrations --test fase33y_h_wire_fuzz -- --nocapture

  group-pix:
    name: 33.y.i — 3 PIX variants (Hibernate / Drill / Trail)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.y.i — PIX paper §6 hidden-state primitives
        run: |
          cd axon-rs
          cargo test --test fase33y_i_pix_handlers -- --nocapture

  group-lambda-tools:
    name: 33.y.j — Lambda + UseTool (🎉 45 of 45 FINAL)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.y.j — lambda + tool (45/45 graduation marker)
        run: |
          cd axon-rs
          cargo test --test fase33y_j_lambda_tools -- --nocapture

  d8-tools-first-class:
    name: 33.y.k — D8 milestone (ToolCall event variant + ChatRequest.tools plumbing)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.y.k — tools first-class on streaming path
        run: |
          cd axon-rs
          cargo test --test fase33y_k_tools_first_class -- --nocapture

  d7-parity-gate:
    name: 33.y.l — D7 grep parity gate (no markers + no retired symbols + pinned module set)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.y.l — D7 grep parity gate
        run: |
          cd axon-rs
          cargo test --test fase33y_l_parity_gate -- --nocapture

  d12-consolidated-fuzz:
    name: 33.y.n — D12 consolidated fuzz (5 250 LCG iters across 6 cross-cutting surfaces)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.y.n — consolidated cross-cutting fuzz pack
        run: |
          cd axon-rs
          cargo test --test fase33y_fuzz -- --nocapture

  cross-stack-drift:
    name: cross-stack drift — flow_plan::ir_flow_node_kind ↔ Python parity
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: Install axon-lang Python side
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Cross-stack flow_plan kind slug drift (D11 anchor)
        run: |
          # Rust side — 45 slugs from flow_plan::ir_flow_node_kind
          # exercised by the 33.y.b drift gate.
          cd axon-rs
          cargo test --test fase33y_b_dispatcher_skeleton flow_plan_kind -- --nocapture

  # Final aggregator — depends on every lane above so the master
  # CI status check (the green-tick that gates PR merge) is a
  # single-source-of-truth for the 33.y cycle's contract.
  summary:
    name: 33.y cycle — all lanes pass
    runs-on: ubuntu-latest
    needs:
      - diagnostic-anchor
      - dispatcher-skeleton
      - group-pure-shape
      - group-orchestration
      - group-parallel-algebraic
      - group-cognitive
      - group-algebraic-handlers
      - group-wire-integrations
      - group-pix
      - group-lambda-tools
      - d8-tools-first-class
      - d7-parity-gate
      - d12-consolidated-fuzz
      - cross-stack-drift
    steps:
      - name: 33.y cycle summary
        run: |
          echo "🎉 Fase 33.y cycle CI: ALL 14 LANES GREEN."
          echo ""
          echo "Contract honored:"
          echo "  D1 totality          — 45 of 45 IRFlowNode variants graduated"
          echo "  D2 4-policy enforcer — per-node activation"
          echo "  D3 cancel            — propagation across all 45 variants"
          echo "  D4 wire byte-compat  — preserved end-to-end"
          echo "  D6 per-step audit    — StepAuditRecord on every step-scoped handler"
          echo "  D7 no markers        — grep gate enforces at every push"
          echo "  D8 tools first-class — ToolCall closed-catalog event variant"
          echo "  D9 algebraic         — Stream.Yield → axon.token bridge"
          echo "  D10 sync parity      — outcome semantics deterministic"
          echo "  D11 cross-stack      — flow_plan kind slugs Rust ↔ Python"
          echo "  D12 fuzz             — ~16 650 LCG iters total (per-sub-fase + consolidated)"
