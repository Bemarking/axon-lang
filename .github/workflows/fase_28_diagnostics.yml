name: Fase 28 — Diagnostic Robustness Gate

# §Fase 28.i — Dedicated CI workflow exercising the cross-stack
# diagnostic-robustness contract on every PR + master push.
#
# Three lanes run in parallel:
#
#   1. python-diagnostics   — full Fase 28 Python pack + 1000-iter
#                              fuzz + drift-gate corpus
#   2. rust-diagnostics     — full Fase 28 Rust pack + 1000-iter
#                              fuzz + drift-gate corpus
#   3. drift-gate-parity    — explicit cross-stack assertion that
#                              both stacks agree byte-identically
#                              on every corpus entry
#
# D7 ratified 2026-05-10: byte-identical error lists across stacks.
# D12 ratified: deterministic-seeded 1000-iter fuzz per CI run.
#
# This workflow is in addition to the existing `ci.yml` full-suite
# run; the dedicated lanes keep the diagnostic-robustness signal
# clearly visible on PRs touching parser / error / smart-suggest /
# multi-file / JSON / strict surfaces.

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Python lane: Fase 28 test packs + 1000-iter fuzz ───────────
  python-diagnostics:
    name: Python diagnostics (Fase 28)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tools,server]"

      - name: Run Fase 28 Python test packs
        run: |
          pytest \
            tests/test_fase28_parser_recovery.py \
            tests/test_fase28_source_context.py \
            tests/test_fase28_smart_suggest.py \
            tests/test_fase28_multi_file.py \
            tests/test_fase28_json_output.py \
            tests/test_fase28_strict_mode.py \
            tests/test_fase28_drift_gate.py \
            -v --tb=short

      - name: Verify 1000-iter deterministic fuzz holds (D12)
        # The fuzz lives inside test_fase28_parser_recovery.py;
        # this step pins it as an isolated lane so a regression
        # in fuzz robustness is loudly visible in the workflow
        # timeline, not buried in the broader pack.
        run: |
          pytest tests/test_fase28_parser_recovery.py \
            -k "fuzz or random" -v --tb=short

  # ── Rust lane: axon-frontend Fase 28 modules + drift-gate ──────
  rust-diagnostics:
    name: Rust diagnostics (Fase 28)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-frontend/target
          key: ${{ runner.os }}-cargo-fase28-${{ hashFiles('axon-frontend/Cargo.lock', 'axon-frontend/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase28-

      - name: Run axon-frontend Fase 28 module + parser tests
        working-directory: axon-frontend
        run: |
          cargo test --lib parser::fase28 -- --nocapture
          cargo test --lib smart_suggest::fase28 -- --nocapture

      - name: Run cross-stack drift-gate integration test
        working-directory: axon-frontend
        run: cargo test --test fase28_drift_gate -- --nocapture

      - name: Verify 1000-iter deterministic fuzz holds (D12)
        working-directory: axon-frontend
        run: cargo test --lib fuzz_recovery_never_crashes -- --nocapture

  # ── Cross-stack parity assertion ───────────────────────────────
  #
  # Both stacks read `tests/fixtures/fase28_drift_gate/corpus.json`.
  # If a Python regression and a Rust regression drift in lockstep,
  # neither lane would flag it on its own — but the regenerator
  # script is run here to confirm Python's current output matches
  # the committed JSON byte-for-byte, and the Rust integration
  # test (run under the rust-diagnostics lane above) asserts Rust
  # also matches. If either side disagrees, exactly one lane fails
  # — drift caught at PR-time, not at adopter-bug-report-time.
  drift-gate-parity:
    name: Drift-gate parity (D7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install minimal Python dependencies
        # Drift-gate is pure-frontend (lexer + parser only) — no
        # need for the heavier extras.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify regen script produces unchanged corpus.json
        run: |
          # Snapshot the committed corpus.
          cp tests/fixtures/fase28_drift_gate/corpus.json /tmp/committed_corpus.json

          # Run the regenerator against the canonical INPUTS list.
          python scripts/fase28_regen_drift_corpus.py

          # Assert byte-for-byte equality. If this diff fires, the
          # Python parser output drifted from the committed snapshot
          # — fix the parser or update the snapshot intentionally
          # (and run the Rust drift-gate test before committing).
          diff -u /tmp/committed_corpus.json tests/fixtures/fase28_drift_gate/corpus.json

      - name: Run Python drift-gate test
        run: pytest tests/test_fase28_drift_gate.py -v --tb=short
