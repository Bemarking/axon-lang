name: Fase 32 — Axonendpoint as First-Class HTTP REST

# §Fase 32.i — Dedicated CI workflow exercising the full Fase 32 REST
# surface on every PR + master push. D10 + D11 + D12 ratificadas
# 2026-05-11; this workflow locks the cross-stack contract + D12 fuzz
# at PR time so adopter-facing regressions surface BEFORE a release
# ever ships.
#
# Five parallel lanes:
#
#   1. python-router-and-validators — 3.12 × 3.13. Exercises every
#      Python-side surface: route registration drift (32.b), body
#      schema validation (32.c), auth-slug grammar (32.g parse side),
#      replay-binding parser (32.h), D12 fuzz (32.i).
#
#   2. rust-runtime — Ubuntu. Exercises every Rust-side surface
#      end-to-end through the actual `dynamic_endpoint_handler`:
#      routes drift (32.b), body schema (32.c), output schema (32.d),
#      per-route transport (32.e), Idempotency-Key (32.f), auth scope
#      (32.g), replay binding (32.h), D12 fuzz (32.i).
#
#   3. cross-stack-drift — D11 parity over the two shared corpora:
#      tests/fixtures/fase32_routes/corpus.json (route table) +
#      tests/fixtures/fase32_body_schema/corpus.json (schema
#      validation). Both stacks read the same JSON; if either drifts,
#      exactly one lane fails.
#
#   4. vertical-canonical-patterns — Banking (PCI DSS + SOC 2),
#      Government (FedRAMP + FISMA), Legal (FRE 502 + ABA Rule 1.6),
#      Medicine (HIPAA + 21 CFR Part 11). Each canonical example
#      deploys + exercises body + auth + replay end-to-end through
#      a real server.
#
#   5. fase32-fuzz-d12 — 100-bucket × 10-iter deterministic fuzz on
#      every public predicate the runtime exposes (validate_body,
#      collect_axonendpoint_routes, is_valid_capability_slug,
#      resolve_replay_enabled, classify_dynamic_route_wire,
#      IdempotencyStore, AxonendpointReplayLog). The "never panic"
#      invariant must hold over adversarial inputs.

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── 1. Python lane: routes + schemas + auth + replay parser + fuzz ──
  python-router-and-validators:
    name: Python router + validators + parser + fuzz (Fase 32)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tools,server]"

      - name: Run Fase 32.b routes drift gate (Python side)
        run: pytest tests/test_fase32_routes_drift.py -v --tb=short

      - name: Run Fase 32.c body schema validation
        run: pytest tests/test_fase32_body_schema.py -v --tb=short

      - name: Run Fase 32.g auth-scope parser + slug grammar
        run: pytest tests/test_fase32_auth_scope.py -v --tb=short

      - name: Run Fase 32.h replay-binding parser
        run: pytest tests/test_fase32_replay_binding.py -v --tb=short

      - name: Run Fase 32.i D12 robustness fuzz (550 iters)
        # 100 seeds × 10 iters × 5 surfaces. Never-panic invariant
        # surfaced as a separate step so a fuzz regression is loudly
        # visible in the workflow timeline.
        run: pytest tests/test_fase32_fuzz.py -v --tb=short

  # ── 2. Rust runtime lane: full end-to-end surface ───────────────────
  rust-runtime:
    name: Rust runtime — full Fase 32 REST surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-fase32-runtime-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase32-runtime-

      - name: Run Fase 32.b routes drift gate + dynamic-route runtime
        working-directory: axon-rs
        run: cargo test --test fase32_routes_drift -- --nocapture

      - name: Run Fase 32.c body schema validation (E2E HTTP)
        working-directory: axon-rs
        run: cargo test --test fase32_body_schema -- --nocapture

      - name: Run Fase 32.d output schema validation (OWASP-safe 500)
        working-directory: axon-rs
        run: cargo test --test fase32_output_schema -- --nocapture

      - name: Run Fase 32.e per-route transport + Fase 30/31 parity
        working-directory: axon-rs
        run: cargo test --test fase32_dynamic_transport -- --nocapture

      - name: Run Fase 32.f Idempotency-Key (Stripe-compatible)
        working-directory: axon-rs
        run: cargo test --test fase32_idempotency -- --nocapture

      - name: Run Fase 32.g auth scope (declared_requires ⊆ have)
        working-directory: axon-rs
        run: cargo test --test fase32_auth_scope -- --nocapture

      - name: Run Fase 32.h replay-binding + GET /v1/replay/<id>
        working-directory: axon-rs
        run: cargo test --test fase32_replay_binding -- --nocapture

      - name: Run Fase 32 lib unit packs (route_schema, idempotency,
              auth_scope, axonendpoint_replay, dynamic_route_wire)
        working-directory: axon-rs
        run: |
          cargo test --lib route_schema -- --nocapture
          cargo test --lib idempotency -- --nocapture
          cargo test --lib auth_scope -- --nocapture
          cargo test --lib axonendpoint_replay -- --nocapture
          cargo test --lib dynamic_route_wire -- --nocapture

      - name: Run Fase 30/31 regression (negotiation surface)
        # The Fase 32 work must NOT regress any Fase 30/31 behavior
        # — D6 D10 absolute backwards-compat. This step pins the
        # contract explicitly in the workflow.
        working-directory: axon-rs
        run: |
          cargo test --test fase30_negotiation -- --nocapture
          cargo test --test fase30_keepalive -- --nocapture
          cargo test --test fase30_sse_runtime -- --nocapture
          cargo test --test fase31_strict_mode -- --nocapture
          cargo test --test fase31_diagnostic_header -- --nocapture
          cargo test --test fase31_flag_surface -- --nocapture

  # ── 3. Cross-stack drift parity (D11) ───────────────────────────────
  #
  # Both stacks read the same corpora at
  #   tests/fixtures/fase32_routes/corpus.json (14 entries; route table)
  #   tests/fixtures/fase32_body_schema/corpus.json (29 entries; schema)
  # If either stack drifts on the verdict for a given entry, exactly
  # one lane fails — drift caught at PR-time, not at adopter-bug-
  # report time.
  cross-stack-drift:
    name: Cross-stack drift parity (D11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install minimal Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify Fase 32.b routes corpus shape
        run: |
          python -c "import json; \
                     data = json.load(open('tests/fixtures/fase32_routes/corpus.json')); \
                     assert 'entries' in data, 'routes corpus must carry entries key'; \
                     assert len(data['entries']) >= 14, f'routes corpus has only {len(data[\"entries\"])} entries (need >= 14)'"

      - name: Verify Fase 32.c body schema corpus shape
        run: |
          python -c "import json; \
                     data = json.load(open('tests/fixtures/fase32_body_schema/corpus.json')); \
                     assert 'entries' in data, 'body schema corpus must carry entries key'; \
                     assert len(data['entries']) >= 25, f'body schema corpus has only {len(data[\"entries\"])} entries (need >= 25)'"

      - name: Run Python routes corpus drift assertion (D11)
        run: |
          pytest tests/test_fase32_routes_drift.py -v --tb=short

      - name: Run Python body schema corpus drift assertion (D11)
        run: |
          pytest tests/test_fase32_body_schema.py::test_python_validation_matches_corpus \
            -v --tb=short

      - name: Run Rust routes corpus drift assertion (D11)
        working-directory: axon-rs
        run: cargo test --test fase32_routes_drift -- --nocapture

      - name: Run Rust body schema corpus drift assertion (D11)
        working-directory: axon-rs
        run: cargo test --test fase32_body_schema rust_validation_matches_corpus_for_every_entry -- --nocapture

  # ── 4. High-profile vertical canonical patterns ─────────────────────
  #
  # Banking + Government + Legal + Medicine canonical example sources.
  # Each one deploys via real /v1/deploy + exercises body validation +
  # auth scope + replay binding end-to-end. The patterns from plan
  # vivo § "X-ray vision" become testable contracts.
  vertical-canonical-patterns:
    name: Vertical canonical patterns (banking/gov/legal/medicine)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-fase32-vertical-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase32-vertical-

      - name: Run vertical canonical patterns (4 verticals, E2E)
        working-directory: axon-rs
        run: cargo test --test fase32_vertical_patterns -- --nocapture

  # ── 5. D12 robustness fuzz ──────────────────────────────────────────
  #
  # Total + non-panicking invariant for every public predicate the
  # runtime exposes on the dynamic-route surface. 100 seeds × 10
  # iters × N surfaces. Deterministic; regressions reproduce verbatim.
  fase32-fuzz-d12:
    name: D12 robustness fuzz (~1500 iters)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-fase32-fuzz-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase32-fuzz-

      - name: Python D12 fuzz (550+ iters across 5 surfaces)
        run: pytest tests/test_fase32_fuzz.py -v --tb=short

      - name: Rust D12 fuzz (14 surfaces × 100 seeds × 10 iters)
        working-directory: axon-rs
        run: cargo test --test fase32_fuzz -- --nocapture
