name: Fase 36.x — Mixed-Flow Streaming Integrity

# §Fase 36.x.g (D6, D5) — Dedicated CI workflow exercising the full
# mixed-flow streaming surface on every PR + master push. D1–D6
# ratificadas 2026-05-17; this workflow locks the contract — the
# exactly-one-terminator wire invariant, `in_memory` as a first-class
# declarable `axonstore` backend, the `retrieve → step → persist`
# agent shape behind a streaming `axonendpoint`, the streaming-path
# data-flow integrity, and the D1 property/fuzz pass — at PR time so
# the gap report's defect class (a mixed agent flow that streams a
# malformed double-terminator wire, has no test, and cannot run
# without a live Postgres) can never regress into a release.
#
# Four parallel lanes:
#
#   1. rust-frontend — `in_memory` as a declarable `axonstore`
#      backend: the `VALID_STORE_BACKENDS` catalog add (36.x.b/D2),
#      `connection:`-optional, the SQL backends still valid, an
#      unknown backend still rejected, the full agent flow compiles.
#
#   2. rust-runtime — every runtime surface end-to-end through the
#      real streaming dispatcher: the diagnostic anchor (36.x.a),
#      the `in_memory` runtime backend + canonical agent flow
#      (36.x.b), the mixed-flow streaming integration pack — the
#      founder's exact `ChatFlow` shape included (36.x.d), and the
#      data-flow integrity audit — `${interpolation}` threads a
#      `retrieve` alias and a `step` output across the streaming
#      path (36.x.e).
#
#   3. fuzz-d1 — the 600-iteration deterministic property pass over
#      `run_streaming_via_dispatcher`: exactly one terminator
#      (`FlowComplete` XOR `FlowError`) for every flow shape, every
#      outcome — NEVER a double terminator (the core D1 invariant).
#
#   4. regression — Fase 33/34 streaming surfaces Fase 36.x touches
#      (the streaming producer, the streaming-tool dispatch path,
#      the enforcement-summary + metadata population, the unified
#      stream handler). D5 absolute: the exactly-one-terminator gate
#      + the streaming-path data-flow fix must not regress any prior
#      streaming wire.

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── 1. Frontend lane: `in_memory` as a declarable backend ───────────
  rust-frontend:
    name: Rust frontend — in_memory axonstore backend (Fase 36.x.b/D2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-frontend/target
          key: ${{ runner.os }}-cargo-fase36x-frontend-${{ hashFiles('axon-frontend/Cargo.lock', 'axon-frontend/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase36x-frontend-

      - name: "Fase 36.x.b — `backend: in_memory` type-checks (catalog + connection-optional)"
        working-directory: axon-frontend
        run: cargo test --test fase36x_b_in_memory_store -- --nocapture

  # ── 2. Runtime lane: full mixed-flow streaming surface ──────────────
  rust-runtime:
    name: Rust runtime — full Fase 36.x mixed-flow streaming surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-fase36x-runtime-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase36x-runtime-

      - name: Fase 36.x.a — mixed-flow streaming diagnostic anchor
        working-directory: axon-rs
        run: cargo test --test fase36x_a_mixed_flow_streaming_diagnostic -- --nocapture

      - name: Fase 36.x.b — in_memory runtime backend + canonical agent flow
        working-directory: axon-rs
        run: cargo test --test fase36x_b_in_memory_store -- --nocapture

      - name: Fase 36.x.d — mixed-flow streaming integration (the founder's ChatFlow shape)
        working-directory: axon-rs
        run: cargo test --test fase36x_d_mixed_flow_streaming -- --nocapture

      - name: Fase 36.x.e — streaming-path data-flow integrity audit
        working-directory: axon-rs
        run: cargo test --test fase36x_e_data_flow_integrity -- --nocapture

  # ── 3. D1 fuzz lane: the exactly-one-terminator property pass ───────
  fuzz-d1:
    name: Fase 36.x.f — exactly-one-terminator D1 fuzz (600 iters)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-fase36x-fuzz-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase36x-fuzz-

      - name: Fase 36.x.f — terminator fuzz (never two, always one when not cancelled)
        working-directory: axon-rs
        run: cargo test --test fase36x_f_terminator_fuzz -- --nocapture

  # ── 4. Regression lane: D5 — no prior streaming surface regresses ───
  #
  # Fase 36.x gates `run_streaming_via_dispatcher`'s post-loop
  # `FlowComplete` and fixes the streaming-path data-flow. D5 is
  # absolute — every Fase 33/34 streaming wire must be preserved. This
  # lane pins the streaming-tool dispatch path, the enforcement-summary
  # + metadata population, and the unified stream handler at PR time.
  regression:
    name: Fase 33/34 streaming regression (D5 — Fase 36.x must not regress)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-fase36x-regression-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase36x-regression-

      - name: Fase 33 streaming producer + stream-effect layer
        working-directory: axon-rs
        run: |
          cargo test --test fase33_b_stub_steps_executed_anchor -- --nocapture
          cargo test --test fase33_e_stream_effect_layer -- --nocapture
          cargo test --test fase33z_c_default_on_and_tool_call -- --nocapture

      - name: Fase 33/34 streaming-tool path — enforcement summary + metadata + unified handler
        working-directory: axon-rs
        run: |
          cargo test --test fase33x_d_enforcer_activation -- --nocapture
          cargo test --test fase33z_k_h_metadata_population -- --nocapture
          cargo test --test fase34_a_unified_stream_handler_diagnostic -- --nocapture
