name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  # Opt into Node.js 24 for every JavaScript action — GitHub deprecates
  # Node 20 on 2026-09-16; default flips on 2026-06-02.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        # The CI surface installs the test-relevant extras only:
        #   • dev    — pytest + hypothesis + lint/build tooling
        #   • tools  — httpx + PyMuPDF (real tool backends used by tests)
        #   • server — starlette + uvicorn (test_path_matcher /
        #              test_axon_server import the AxonServer dispatcher,
        #              which raises ImportError without starlette).
        # Heavier extras (anthropic/openai/gemini/ollama backends, pq/fhe/
        # vault/keyvault/grpc) are NOT installed here — those tests gate
        # on credentials or native libs and run in dedicated workflows.
        # Pre-Fase-23.i this list was just `[dev,tools]`, leaving
        # test_path_matcher.py red on every CI run since v1.5.x.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tools,server]"

      - name: Run tests
        run: pytest tests/ -q --tb=short

      - name: Verify CLI
        run: |
          axon version
          axon check examples/contract_analyzer.axon
          axon compile examples/contract_analyzer.axon --stdout > /dev/null

  rust-native:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: axon-linux-x86_64
            binary_path: axon-rs/target/release/axon
          - os: windows-latest
            artifact_name: axon-windows-x86_64
            binary_path: axon-rs/target/release/axon.exe
          - os: macos-latest
            artifact_name: axon-macos-arm64
            binary_path: axon-rs/target/release/axon

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Run cargo test
        working-directory: axon-rs
        run: cargo test --verbose

      - name: Build release binary
        working-directory: axon-rs
        run: cargo build --release

      - name: Validate native CLI (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: axon-rs
        run: |
          ./target/release/axon version
          ./target/release/axon check ../examples/contract_analyzer.axon
          ./target/release/axon compile ../examples/contract_analyzer.axon --stdout > /dev/null
          ./target/release/axon run ../examples/contract_analyzer.axon --tool-mode stub
          ./target/release/axon trace ../examples/sample.trace.json --no-color
          ./target/release/axon inspect anchors
          ./target/release/axon inspect NoHallucination
          echo '.quit' | ./target/release/axon repl

      - name: Validate native CLI (Windows)
        if: runner.os == 'Windows'
        working-directory: axon-rs
        shell: pwsh
        run: |
          .\target\release\axon.exe version
          .\target\release\axon.exe check ..\examples\contract_analyzer.axon
          .\target\release\axon.exe compile ..\examples\contract_analyzer.axon --stdout | Out-Null
          .\target\release\axon.exe run ..\examples\contract_analyzer.axon --tool-mode stub
          .\target\release\axon.exe trace ..\examples\sample.trace.json --no-color
          .\target\release\axon.exe inspect anchors
          .\target\release\axon.exe inspect NoHallucination
          echo '.quit' | .\target\release\axon.exe repl

      - name: Upload native binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          if-no-files-found: error

  # ── Release ───────────────────────────────────────────────────────────────
  # Triggered only on version tags (v*). Downloads artifacts from rust-native
  # and creates a GitHub Release with platform binaries attached.

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, rust-native]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cd release-artifacts
          # Linux
          if [ -d axon-linux-x86_64 ]; then
            chmod +x axon-linux-x86_64/axon
            tar czf ../release-assets/axon-linux-x86_64.tar.gz -C axon-linux-x86_64 axon
          fi
          # macOS
          if [ -d axon-macos-arm64 ]; then
            chmod +x axon-macos-arm64/axon
            tar czf ../release-assets/axon-macos-arm64.tar.gz -C axon-macos-arm64 axon
          fi
          # Windows
          if [ -d axon-windows-x86_64 ]; then
            (cd axon-windows-x86_64 && zip ../../release-assets/axon-windows-x86_64.zip axon.exe)
          fi
          ls -la ../release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}

  # ── axon-csys (Fase 25 — C23 metal-bound kernels) ────────────────────────
  # Cross-OS matrix that exercises the cc-rs → C23 → static link → FFI
  # pipeline. 25.b ships only the build-infrastructure probe; subsequent
  # sub-fases (25.c onward) reuse this job as their gate. Windows uses
  # MSVC's `/std:clatest` (which reports __STDC_VERSION__=202312L instead
  # of the ratified 202311L — accepted as a vendor quirk in the test
  # whitelist). Linux + macOS exercise the gcc/clang -std=c23 path with
  # graceful fallback to -std=c2x for older toolchains.
  axon-csys:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry and build (axon-csys)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-csys/target
          key: ${{ runner.os }}-axon-csys-${{ hashFiles('axon-csys/Cargo.toml', 'axon-csys/build.rs', 'axon-csys/c-src/**/*') }}
          restore-keys: |
            ${{ runner.os }}-axon-csys-

      - name: Verify C compiler is available (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cc --version
          echo "Realised C compiler: $(cc --version | head -1)"

      - name: cargo build (axon-csys)
        working-directory: axon-csys
        run: cargo build --verbose

      - name: cargo test (axon-csys)
        working-directory: axon-csys
        run: cargo test --verbose

      - name: cargo fmt check (axon-csys)
        working-directory: axon-csys
        run: cargo fmt --all -- --check

      - name: cargo clippy (axon-csys, all warnings → errors)
        working-directory: axon-csys
        run: cargo clippy --all-targets -- -D warnings

      # ─── D12 enforcement (Fase 25 plan vivo, 2026-05-08) ─────────────────
      # axon-csys is the SINGLE place that calls cc::Build. Any new C dep
      # in axon-rs or axon-frontend MUST live in axon-csys/c-src + ride the
      # axon-csys FFI surface. This grep catches accidental violations
      # before they merge.
      - name: D12 lint — no cc::Build outside axon-csys
        if: runner.os == 'Linux'
        run: |
          set -e
          violations=$(grep -rEn 'cc::Build::new' \
            --include='*.rs' \
            axon-rs axon-frontend 2>/dev/null || true)
          if [ -n "$violations" ]; then
            echo "❌ D12 violation: cc::Build::new() outside axon-csys/build.rs"
            echo "$violations"
            echo ""
            echo "Per founder ratification 2026-05-08, axon-csys is the sole"
            echo "owner of C build orchestration. Move the C source into"
            echo "axon-csys/c-src/ and expose it via the axon-csys Rust shim."
            exit 1
          fi
          echo "✅ D12 clean — cc::Build only lives in axon-csys/build.rs"

  windows-mvp-executable:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build AXON MVP executable
        shell: pwsh
        run: |
          $env:AXON_PYTHON = (Get-Command python).Source
          & .\scripts\build_axon_mvp_windows.ps1

      - name: Validate packaged MVP executable
        shell: pwsh
        run: |
          & .\build\pyinstaller\dist\axon\axon.exe version
          & .\build\pyinstaller\dist\axon\axon.exe check examples/contract_analyzer.axon --no-color
          & .\build\pyinstaller\dist\axon\axon.exe compile examples/contract_analyzer.axon --output temp_ci_compile.ir.json
          if (-not (Test-Path .\temp_ci_compile.ir.json)) { throw 'compile did not generate temp_ci_compile.ir.json' }
          & .\build\pyinstaller\dist\axon\axon.exe trace examples/sample.trace.json --no-color | Out-Null
          & .\scripts\validate_axon_mvp_error_contract.ps1

      - name: Upload AXON MVP executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: axon-mvp-windows
          path: build/pyinstaller/dist/axon/
          if-no-files-found: error
