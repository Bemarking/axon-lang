name: CI

# §Fase 39.i — v2.0.0 Pure Silicon Cognition. The CI is now
# Rust-canonical: there is no Python language stack to test. The
# gate exercises the three Rust crates (axon-frontend, axon-csys via
# its own workflow, axon-rs) + builds the native binary + validates
# the public CLI contract + runs the 2 Cat 3 subprocess tests that
# anchor the CLI contract against the binary.

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── Rust-canonical test + native binary build ────────────────────
  rust-native:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: axon-linux-x86_64
            binary_path: axon-rs/target/release/axon
          - os: windows-latest
            artifact_name: axon-windows-x86_64
            binary_path: axon-rs/target/release/axon.exe
          - os: macos-latest
            artifact_name: axon-macos-arm64
            binary_path: axon-rs/target/release/axon

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # §Fase 39.i — the frontend lib carries the lexer / parser /
      # type-checker / IR generator + the FlowEnvelope type system
      # (39.a) + axon-E039 wire-shape gate (39.e). Test it explicitly.
      - name: Run cargo test (axon-frontend)
        working-directory: axon-frontend
        run: cargo test --verbose

      - name: Run cargo test (axon-rs)
        working-directory: axon-rs
        run: cargo test --verbose

      - name: Build release binary
        working-directory: axon-rs
        run: cargo build --release

      - name: Validate native CLI (Linux/macOS)
        if: runner.os != 'Windows'
        working-directory: axon-rs
        run: |
          ./target/release/axon version
          ./target/release/axon check ../examples/contract_analyzer.axon
          ./target/release/axon compile ../examples/contract_analyzer.axon --stdout > /dev/null
          ./target/release/axon run ../examples/contract_analyzer.axon --tool-mode stub
          ./target/release/axon trace ../examples/sample.trace.json --no-color
          ./target/release/axon parse ../examples/contract_analyzer.axon
          ./target/release/axon fmt ../examples/contract_analyzer.axon > /dev/null
          ./target/release/axon inspect anchors
          echo '.quit' | ./target/release/axon repl

      - name: Validate native CLI (Windows)
        if: runner.os == 'Windows'
        working-directory: axon-rs
        shell: pwsh
        run: |
          .\target\release\axon.exe version
          .\target\release\axon.exe check ..\examples\contract_analyzer.axon
          .\target\release\axon.exe compile ..\examples\contract_analyzer.axon --stdout | Out-Null
          .\target\release\axon.exe run ..\examples\contract_analyzer.axon --tool-mode stub
          .\target\release\axon.exe trace ..\examples\sample.trace.json --no-color
          .\target\release\axon.exe parse ..\examples\contract_analyzer.axon
          .\target\release\axon.exe fmt ..\examples\contract_analyzer.axon | Out-Null
          .\target\release\axon.exe inspect anchors

      - name: Upload native binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.binary_path }}
          if-no-files-found: error

  # ── Cat 3 CLI contract tests (subprocess against the binary) ──────
  # §Fase 39.g — the 2 surviving Python tests anchor the public CLI
  # contract. They subprocess-invoke the native binary (no Python
  # language runtime). Run on Linux only (the contract is platform-
  # agnostic; the rust-native job already validates the binary on
  # all 3 OSes).
  cli-contract:
    runs-on: ubuntu-latest
    needs: [rust-native]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ubuntu-latest-cargo-${{ hashFiles('axon-rs/Cargo.lock') }}
          restore-keys: ubuntu-latest-cargo-

      - name: Build the native binary
        working-directory: axon-rs
        run: cargo build

      - name: Set up Python (for the Cat 3 subprocess harness only)
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pytest (test harness, NOT the language)
        run: |
          python -m pip install --upgrade pip
          pip install pytest

      - name: Run Cat 3 CLI contract tests against the native binary
        run: pytest tests/test_cli_mvp_smoke.py tests/test_frontend_contract_golden.py -q

  # ── Release ───────────────────────────────────────────────────────
  # Triggered only on version tags (v*). Downloads native binaries
  # from rust-native and creates a GitHub Release with platform
  # binaries attached.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [rust-native, cli-contract]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all native artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          cd release-artifacts
          if [ -d axon-linux-x86_64 ]; then
            chmod +x axon-linux-x86_64/axon
            tar czf ../release-assets/axon-linux-x86_64.tar.gz -C axon-linux-x86_64 axon
          fi
          if [ -d axon-macos-arm64 ]; then
            chmod +x axon-macos-arm64/axon
            tar czf ../release-assets/axon-macos-arm64.tar.gz -C axon-macos-arm64 axon
          fi
          if [ -d axon-windows-x86_64 ]; then
            (cd axon-windows-x86_64 && zip ../../release-assets/axon-windows-x86_64.zip axon.exe)
          fi
          ls -la ../release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') || contains(github.ref, '-alpha') }}
