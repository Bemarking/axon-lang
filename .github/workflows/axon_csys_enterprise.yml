# §Fase 27.h — axon-csys-enterprise cross-platform C23 CI matrix.
#
# Production-grade matrix exercising the axon-csys-enterprise C23
# enterprise-only kernels across every realistic adopter toolchain.
# Mirrors the OSS axon-csys CI 14-lane matrix verbatim where possible,
# adapted for the enterprise crate's additional surface:
#
#   1. CORE              — Linux gcc-13 / Linux clang-17 / macOS clang
#                          / Windows MSVC. Each lane builds debug +
#                          release, runs the full test suite under
#                          both profiles (release exercises optimizer-
#                          dependent UB), then enforces fmt + clippy
#                          warnings-as-errors. The audit log mmap
#                          kernel exercises POSIX mmap on Linux/macOS
#                          and MapViewOfFile on Windows — cross-
#                          platform mmap byte-identity is a load-
#                          bearing claim of 27.d.
#   2. HARDENING         — AddressSanitizer + UndefinedBehaviorSanitizer
#                          + ThreadSanitizer (each in its own job, all
#                          on Linux × clang nightly with `-Zbuild-std`)
#                          + valgrind (Linux × gcc, full leak-check) +
#                          cppcheck + clang-tidy. Catches FFI memory
#                          bugs in audit log mmap concurrent-writer
#                          path + crypto FIPS glue + PHI scrubber +
#                          evidence packager Ed25519 path.
#   3. CROSS-ARCH        — Linux/aarch64 (Graviton/RPi/M-class) build
#                          + test, plus a musl-libc smoke build (Alpine
#                          container) to verify portability beyond
#                          glibc. macOS Apple-Silicon ARM64 is already
#                          covered by the CORE macos lane.
#   4. DRIFT + LINT      — Vertical BPE drift gate (verifies v1 seed
#                          `.bin` blobs match `tools/train_vertical_
#                          merges.py` output) + enterprise license
#                          posture lints (verify `publish = false` +
#                          LICENSE.bsl present + license-file declared
#                          in Cargo.toml).
#   5. FIPS              — Enterprise-specific: build + test with
#                          `--features fips-openssl` against the
#                          system OpenSSL 3.0+ on ubuntu-24.04, which
#                          exposes the same EVP API the FIPS-validated
#                          BoringSSL/OpenSSL-FIPS prebuilts expose.
#                          Verifies the FIPS-routed crypto path
#                          produces byte-identical output to the OSS
#                          pure-C path (D7 drift gate). NOTE: this is
#                          API-compatibility validation only — adopters
#                          running real federal workloads supply their
#                          own NIST-CAVS-validated prebuilts via
#                          AXON_OPENSSL_FIPS_PREBUILT / AXON_BORINGSSL_
#                          FIPS_PREBUILT env vars. The BoringSSL lane
#                          is documented as adopter-side because
#                          Google does not ship CI-friendly prebuilts.
#
# Path filtering is intentionally absent — every PR exercises the
# full matrix because the enterprise crate links transitively into
# the axon-enterprise Python package + supervisor, and a Cargo.lock
# change anywhere can affect linkage.
#
# Founder principle (27.h): "100% nivel producción, no MVP" — every
# realistic adopter toolchain is exercised; sanitizer + valgrind +
# ARM + musl + FIPS coverage is non-optional; toolchain versions
# pinned so regressions are reproducible.

name: axon-csys-enterprise

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # 1. CORE — multi-OS × multi-compiler build + test matrix.
  # ─────────────────────────────────────────────────────────────────────
  core:
    name: core (${{ matrix.os }} / ${{ matrix.toolchain }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux gcc-13 — first version with the C23 alias for c2x.
          - os: ubuntu-latest
            toolchain: gcc-13
            install: |
              sudo apt-get update
              sudo apt-get install -y gcc-13 g++-13
              echo "CC=gcc-13" >> "$GITHUB_ENV"
              echo "CXX=g++-13" >> "$GITHUB_ENV"
            verify: gcc-13 --version
          # Linux clang-17 — first clang release with full C23 lit support.
          - os: ubuntu-latest
            toolchain: clang-17
            install: |
              sudo apt-get update
              sudo apt-get install -y clang-17
              echo "CC=clang-17" >> "$GITHUB_ENV"
              echo "CXX=clang++-17" >> "$GITHUB_ENV"
            verify: clang-17 --version
          # macOS Apple Clang — Apple ships clang 15+ on Ventura+.
          - os: macos-latest
            toolchain: apple-clang
            install: ""
            verify: cc --version
          # Windows MSVC — auto-detected by cc-rs via the Visual Studio
          # install. /std:clatest reports __STDC_VERSION__=202312L.
          - os: windows-latest
            toolchain: msvc
            install: ""
            verify: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Pin C compiler (${{ matrix.toolchain }})
        if: matrix.install != ''
        shell: bash
        run: ${{ matrix.install }}

      - name: Verify C compiler
        if: matrix.verify != ''
        shell: bash
        run: ${{ matrix.verify }}

      - name: Cache cargo registry + axon-csys-enterprise target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-csys-enterprise/target
          key: ${{ runner.os }}-axon-csys-enterprise-${{ matrix.toolchain }}-${{ hashFiles('axon-csys-enterprise/Cargo.toml', 'axon-csys-enterprise/Cargo.lock', 'axon-csys-enterprise/build.rs', 'axon-csys-enterprise/c-src/**/*') }}
          restore-keys: |
            ${{ runner.os }}-axon-csys-enterprise-${{ matrix.toolchain }}-

      - name: cargo build (debug)
        working-directory: axon-csys-enterprise
        run: cargo build --verbose

      - name: cargo build (release)
        working-directory: axon-csys-enterprise
        run: cargo build --release --verbose

      - name: cargo test (debug)
        working-directory: axon-csys-enterprise
        run: cargo test --verbose

      - name: cargo test (release — exercises optimizer-dependent paths)
        working-directory: axon-csys-enterprise
        run: cargo test --release --verbose

      - name: cargo fmt check
        working-directory: axon-csys-enterprise
        run: cargo fmt --all -- --check

      - name: cargo clippy (warnings → errors)
        working-directory: axon-csys-enterprise
        run: cargo clippy --all-targets -- -D warnings

  # ─────────────────────────────────────────────────────────────────────
  # 2. HARDENING — sanitizers + valgrind + static analysis.
  # ─────────────────────────────────────────────────────────────────────

  # Sanitizer matrix: ASan (memory-safety) + TSan (data races in the
  # audit log mmap concurrent-writer path). UBSan runs in the dedicated
  # `ubsan-c-only` job below per the same rustc-nightly limitation OSS
  # axon-csys hit (rustc does not implement `undefined`).
  sanitizer:
    name: sanitizer (${{ matrix.kind }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    # TSan is a soft gate per the same rustc-nightly ABI-mismatch quirk
    # OSS axon-csys documents (build script + proc-macro siblings
    # compiled without the sanitizer flag). Tests still run + race
    # detector still exercises; only the post-test artefact assembly
    # is allowed to fail.
    continue-on-error: ${{ matrix.kind == 'thread' }}
    strategy:
      fail-fast: false
      matrix:
        kind: [address, thread]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust nightly + rust-src
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install clang-17
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-17 lld-17
          echo "CC=clang-17" >> "$GITHUB_ENV"
          echo "CXX=clang++-17" >> "$GITHUB_ENV"

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-enterprise-sanitizer-${{ matrix.kind }}-${{ hashFiles('axon-csys-enterprise/Cargo.lock') }}

      - name: Configure sanitizer flags
        run: |
          case "${{ matrix.kind }}" in
            address)
              echo "ASAN_OPTIONS=detect_leaks=1:abort_on_error=1:check_initialization_order=1:strict_string_checks=1" >> "$GITHUB_ENV"
              ;;
            thread)
              # The audit log writer holds a pthread_mutex_t around
              # the append path; TSan should see no races. The
              # `report_atomic_races=1` opt-in catches sequenced-
              # before violations in the segment header's _Atomic
              # head_offset / event_count.
              echo "TSAN_OPTIONS=halt_on_error=1:second_deadlock_stack=1:report_atomic_races=1" >> "$GITHUB_ENV"
              ;;
          esac

      - name: cargo test under ${{ matrix.kind }} sanitizer
        working-directory: axon-csys-enterprise
        env:
          CFLAGS: "-fsanitize=${{ matrix.kind }} -fno-omit-frame-pointer -O1 -g"
          LDFLAGS: "-fsanitize=${{ matrix.kind }}"
          RUSTFLAGS: "-Zsanitizer=${{ matrix.kind }} -Cunsafe-allow-abi-mismatch=sanitizer -Cforce-frame-pointers=yes -Cdebuginfo=2"
        run: |
          cargo +nightly test \
            -Zbuild-std \
            --target x86_64-unknown-linux-gnu \
            --release \
            --verbose

  # UBSan applied only to the C kernels — same rationale as OSS axon-csys
  # (rustc does not accept `undefined`). The C kernels (audit log,
  # FIPS glue, PHI scrubber) carry the UB risk; the Rust shim is
  # `unsafe`-bounded and miri-friendly.
  ubsan-c-only:
    name: UBSan (C-only, linux × clang)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install clang-17
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-17
          echo "CC=clang-17" >> "$GITHUB_ENV"
          echo "CXX=clang++-17" >> "$GITHUB_ENV"
      - name: cargo test with C-side UBSan
        working-directory: axon-csys-enterprise
        env:
          CFLAGS: "-fsanitize=undefined -fno-omit-frame-pointer -O1 -g"
          # rustc does not implement `undefined`. Compile the C
          # kernels with `-fsanitize=undefined` via CFLAGS; route the
          # final link through clang-17 so libubsan resolves.
          RUSTFLAGS: "-Clinker=clang-17 -Clink-arg=-fsanitize=undefined -Cforce-frame-pointers=yes"
          UBSAN_OPTIONS: "print_stacktrace=1:abort_on_error=1:halt_on_error=1"
        run: cargo test --release --verbose

  # Valgrind exercises a separate-binary code path that ASan can't.
  # Critical for the audit log mmap kernel + evidence packager + PHI
  # scrubber — exposes leak/uninit-read bugs the unit tests don't trip.
  valgrind:
    name: valgrind (linux × gcc)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install valgrind + gcc-13 + jq
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind gcc-13 g++-13 jq
          echo "CC=gcc-13" >> "$GITHUB_ENV"
          echo "CXX=g++-13" >> "$GITHUB_ENV"
          valgrind --version

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-csys-enterprise/target
          key: ${{ runner.os }}-axon-csys-enterprise-valgrind-${{ hashFiles('axon-csys-enterprise/Cargo.lock', 'axon-csys-enterprise/c-src/**/*') }}

      - name: Compile test binaries (no run)
        working-directory: axon-csys-enterprise
        run: cargo test --no-run --message-format=json > test_binaries.jsonl

      - name: Run every test binary under valgrind
        working-directory: axon-csys-enterprise
        run: |
          set -euo pipefail
          mapfile -t binaries < <(
            jq -r 'select(.profile.test == true and .executable != null) | .executable' \
              < test_binaries.jsonl | sort -u
          )
          if [ ${#binaries[@]} -eq 0 ]; then
            echo "❌ No test binaries discovered in cargo output"
            exit 1
          fi
          echo "Discovered ${#binaries[@]} test binaries:"
          for binary in "${binaries[@]}"; do
            echo "  $binary"
          done
          # --error-exitcode=99 fails CI on any leak / invalid access /
          # uninit read. We track only definite leaks because some
          # Rust runtime tooling holds reachable allocations on
          # purpose at exit.
          for binary in "${binaries[@]}"; do
            echo ""
            echo "→ valgrind: $binary"
            valgrind \
              --error-exitcode=99 \
              --leak-check=full \
              --show-leak-kinds=definite,indirect \
              --errors-for-leak-kinds=definite \
              --track-origins=yes \
              --num-callers=30 \
              "$binary" --test-threads=1
          done

  cppcheck:
    name: cppcheck static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck
          cppcheck --version

      - name: Run cppcheck on c-src/ (excluding FIPS glue)
        working-directory: axon-csys-enterprise
        run: |
          # Same posture as OSS axon-csys cppcheck lane: enable
          # warning + performance + portability; suppress the
          # signal-poor categories OSS already documented (style
          # diagnostics produce false positives on FIPS-style code).
          # Suppressions specific to the enterprise crate:
          #   • `unusedFunction` — every C exported function is "unused"
          #     from cppcheck's perspective (it doesn't see Rust callers).
          #   • `missingIncludeSystem` — FFI headers omit system path.
          #
          # `crypto/fips_glue.c` is excluded for the same reason as
          # the clang-tidy lane below: cppcheck cannot parse the file
          # without OpenSSL headers + a FIPS-feature define, and the
          # `fips-openssl-link` lane covers it indirectly when the
          # feature is enabled. Cppcheck's `-i` flag excludes by path.
          cppcheck \
            --error-exitcode=2 \
            --enable=warning,performance,portability \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --std=c23 \
            --inline-suppr \
            --quiet \
            -i c-src/crypto/fips_glue.c \
            -I c-src \
            c-src

  clang-tidy:
    name: clang-tidy static analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-tidy-17
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy-17
          clang-tidy-17 --version

      - name: Run clang-tidy on every C source (excluding FIPS glue)
        working-directory: axon-csys-enterprise
        run: |
          set -euo pipefail
          # Same check set OSS axon-csys uses, with the same
          # documented exclusions (signal-poor on FIPS-style code +
          # cross-platform memcpy).
          #
          # `c-src/crypto/fips_glue.c` is excluded from clang-tidy
          # for two reasons:
          #   (a) It includes <openssl/evp.h> + <openssl/hmac.h> +
          #       <openssl/provider.h> which are NOT installed on the
          #       static-analysis runner (libssl-dev would pull in
          #       300 MB of headers/libs solely for clang-tidy parse).
          #   (b) Its first lines contain a defensive `#error` that
          #       fires when neither AXON_CSYS_ENTERPRISE_FIPS_BORINGSSL
          #       nor AXON_CSYS_ENTERPRISE_FIPS_OPENSSL is defined —
          #       i.e. the file is intentionally un-parseable in the
          #       no-FIPS regime to catch build-script bypasses.
          # The `fips-openssl-link` lane below exercises fips_glue.c
          # with the FIPS feature actually enabled + system OpenSSL
          # installed; clang-tidy coverage is provided indirectly via
          # the `cargo clippy --all-targets` runs in the CORE matrix
          # (Rust shim references every C entry point).
          checks='-*,clang-analyzer-*,bugprone-*,cert-*,portability-*'
          checks+=',-bugprone-easily-swappable-parameters'
          checks+=',-bugprone-macro-parentheses'
          checks+=',-bugprone-narrowing-conversions'
          checks+=',-bugprone-implicit-widening-of-multiplication-result'
          # `bugprone-branch-clone` flags any if/else-if chain whose
          # bodies happen to be byte-identical regardless of the
          # predicates that gate them. False-positives on prefix-
          # dispatch state machines: phi_scrub.c's MRN matcher has
          # three prefix predicates ("MRN", "PATIENT", "PT#") and
          # two of them advance the cursor by 3 — same body, distinct
          # predicates, intentional. The check is signal-poor on
          # dispatch tables; disabling it.
          checks+=',-bugprone-branch-clone'
          checks+=',-cert-err33-c'
          checks+=',-clang-analyzer-security.insecureAPI.strcpy'
          checks+=',-clang-analyzer-security.insecureAPI.DeprecatedOrUnsafeBufferHandling'
          for f in $(find c-src -name '*.c' -not -path '*/crypto/fips_glue.c' | sort); do
            echo ""
            echo "→ clang-tidy: $f"
            clang-tidy-17 \
              --quiet \
              --checks="$checks" \
              --warnings-as-errors='*' \
              "$f" \
              -- \
              -std=c2x \
              -D_POSIX_C_SOURCE=200809L \
              -I c-src
          done

  # ─────────────────────────────────────────────────────────────────────
  # 3. CROSS-ARCH — non-x86_64 + non-glibc smoke.
  # ─────────────────────────────────────────────────────────────────────

  arm64:
    name: cross-arch (linux/aarch64 × gcc)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Verify CPU + compiler
        run: |
          uname -m
          cc --version
          echo "Realised arch: $(uname -m) (expecting aarch64)"

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-csys-enterprise/target
          key: ${{ runner.os }}-axon-csys-enterprise-arm64-${{ hashFiles('axon-csys-enterprise/Cargo.lock', 'axon-csys-enterprise/c-src/**/*') }}

      - name: cargo build (axon-csys-enterprise / aarch64)
        working-directory: axon-csys-enterprise
        run: cargo build --verbose

      - name: cargo test (axon-csys-enterprise / aarch64)
        working-directory: axon-csys-enterprise
        run: cargo test --verbose

  musl:
    name: musl libc smoke (linux × gcc)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    container:
      image: rust:alpine
    steps:
      - uses: actions/checkout@v4

      - name: Install musl build deps
        run: apk add --no-cache musl-dev gcc g++ git bash

      - name: Verify toolchain
        run: |
          rustc --version
          cargo --version
          gcc --version

      - name: cargo build (axon-csys-enterprise / musl)
        working-directory: axon-csys-enterprise
        run: cargo build --verbose

      - name: cargo test --lib (axon-csys-enterprise / musl)
        working-directory: axon-csys-enterprise
        # Library smoke only on musl — same rationale as OSS axon-csys
        # (integration tests pull dev-deps with transitive musl
        # symbol-diff issues). Library smoke exercises every C kernel
        # via Rust unit tests.
        run: cargo test --lib --verbose

  # ─────────────────────────────────────────────────────────────────────
  # 4. DRIFT + LINT — generated-artefact integrity + license posture.
  # ─────────────────────────────────────────────────────────────────────

  enterprise-license-posture:
    name: enterprise license posture (publish=false + LICENSE.bsl)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Verify Cargo.toml has publish = false
        # Per D2 ratification 2026-05-09 — Business Source License v1.1
        # is incompatible with crates.io's OSI-license requirement.
        # The crate is shipped to a private/internal registry (per
        # 27.k release plan). `publish = false` MUST stay set so an
        # accidental `cargo publish` cannot leak the source-available
        # commercial code to the public registry.
        run: |
          set -euo pipefail
          if ! grep -E '^publish\s*=\s*false' axon-csys-enterprise/Cargo.toml > /dev/null; then
            echo ""
            echo "❌ axon-csys-enterprise/Cargo.toml is missing 'publish = false'"
            echo ""
            echo "Per D2 ratification 2026-05-09, this crate is BSL-licensed"
            echo "and CANNOT be published to crates.io (which rejects non-OSI"
            echo "licenses). The enterprise crate ships to a private/internal"
            echo "Cargo registry only. Restore 'publish = false' in"
            echo "axon-csys-enterprise/Cargo.toml."
            exit 1
          fi
          echo "✅ publish = false is set"

      - name: Verify LICENSE.bsl exists + Cargo.toml declares it
        run: |
          set -euo pipefail
          if [ ! -f axon-csys-enterprise/LICENSE.bsl ]; then
            echo "❌ axon-csys-enterprise/LICENSE.bsl is missing"
            exit 1
          fi
          if ! grep -E 'license-file\s*=\s*"LICENSE\.bsl"' axon-csys-enterprise/Cargo.toml > /dev/null; then
            echo "❌ axon-csys-enterprise/Cargo.toml does not declare license-file = \"LICENSE.bsl\""
            exit 1
          fi
          # Spot-check that LICENSE.bsl actually contains the
          # Business Source License header (any minor edit to the
          # license file should preserve the BSL boilerplate so
          # auditors can verify provenance).
          if ! grep -i "Business Source License" axon-csys-enterprise/LICENSE.bsl > /dev/null; then
            echo "❌ LICENSE.bsl does not contain 'Business Source License' header"
            exit 1
          fi
          echo "✅ BSL license posture intact"

      - name: Verify FIPS feature mutual-exclusivity guard is in place
        # Per D3 ratification 2026-05-09 — fips-boringssl + fips-openssl
        # are mutually exclusive. The build.rs panic + the lib.rs
        # compile_error! belt-and-braces guard catches accidental
        # workspace setups that bypass one of them.
        run: |
          set -euo pipefail
          if ! grep -E 'features\s+`fips-boringssl`\s+and\s+`fips-openssl`' \
              axon-csys-enterprise/build.rs > /dev/null; then
            echo "❌ build.rs is missing the D3 mutual-exclusivity guard"
            exit 1
          fi
          if ! grep -E 'compile_error!' axon-csys-enterprise/src/lib.rs > /dev/null; then
            echo "❌ src/lib.rs is missing the compile_error! belt-and-braces guard"
            exit 1
          fi
          echo "✅ D3 mutual-exclusivity guards in place"

  drift-vertical-merges:
    name: drift gate — vertical merges_*_v1_seed.bin matches generator
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install training-tool deps (regex for non-ASCII pretokenizer)
        run: |
          python -m pip install --upgrade pip
          # `regex` is the third-party PCRE-compatible lib the trainer
          # auto-detects for the cl100k pretokenizer pattern. The
          # stdlib fallback is ASCII-only; regenerating the seed
          # blobs deterministically requires the third-party lib.
          pip install regex

      - name: Regenerate vertical merges blobs from canonical seed corpora
        working-directory: axon-csys-enterprise
        run: |
          python tools/train_vertical_merges.py --target-vocab 4096

      - name: Verify committed blobs match generator output
        run: |
          # `git diff --exit-code` returns non-zero if any committed
          # bytes drifted. The error message points at the recovery
          # path: re-run the generator + recommit.
          if ! git diff --exit-code -- \
            axon-csys-enterprise/c-src/tokens/merges_medical_v1_seed.bin \
            axon-csys-enterprise/c-src/tokens/merges_legal_v1_seed.bin \
            axon-csys-enterprise/c-src/tokens/merges_fintech_v1_seed.bin
          then
            echo ""
            echo "❌ Drift detected — committed v1 seed merges blobs differ"
            echo "   from the canonical train_vertical_merges.py output."
            echo ""
            echo "If this drift is intentional (e.g. a corpus revision or a"
            echo "BPE training algorithm tune), regenerate via:"
            echo ""
            echo "    cd axon-csys-enterprise"
            echo "    python tools/train_vertical_merges.py --target-vocab 4096"
            echo ""
            echo "and recommit the .bin files. If unintentional, revert the"
            echo "byte mutation — the file is content-addressed by the"
            echo "BPE drift gate in tests/tokens.rs."
            exit 1
          fi
          echo "✅ Vertical merges blobs are byte-identical to generator output"

  # ─────────────────────────────────────────────────────────────────────
  # 5. FIPS — opt-in cargo-feature build + drift gate vs OSS pure-C.
  #
  # Builds with `--features fips-openssl` against the system OpenSSL
  # 3.0+ on ubuntu-24.04. NOTE: ubuntu-24.04 ships OpenSSL 3.0.x
  # which exposes the same EVP API + FIPS provider mechanics as the
  # NIST-CAVS-validated build. The FIPS provider may not actually be
  # enabled in the system OpenSSL, but the API surface is identical
  # — that's what we exercise here. Adopters running real federal
  # workloads supply their own NIST-CAVS-validated prebuilts via
  # AXON_OPENSSL_FIPS_PREBUILT (the build.rs path that `openssl-sys`
  # crate uses too).
  #
  # The BoringSSL-FIPS lane is documented as adopter-side because
  # Google does not ship CI-friendly prebuilts; adopter integration
  # tests run BoringSSL-FIPS link verification against their own
  # prebuilds.
  # ─────────────────────────────────────────────────────────────────────

  fips-openssl-link:
    name: FIPS-openssl API-compatibility lane
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install OpenSSL 3.0+ dev headers + libs
        run: |
          sudo apt-get update
          # ubuntu-24.04's libssl-dev is OpenSSL 3.0.13+. Install
          # the dev package for headers + the runtime library for
          # the link step.
          sudo apt-get install -y libssl-dev pkg-config
          openssl version

      - name: Stage system OpenSSL as adopter "prebuilt"
        # The build.rs honors AXON_OPENSSL_FIPS_PREBUILT pointing at
        # a directory containing `include/` + `lib/`. Stage the system
        # OpenSSL into a layout that mirrors what an adopter's
        # NIST-CAVS-validated prebuilt would look like.
        run: |
          set -euo pipefail
          STAGED="$RUNNER_TEMP/openssl-fips-staged"
          mkdir -p "$STAGED/include" "$STAGED/lib"
          # System OpenSSL headers live at /usr/include/openssl on
          # Debian/Ubuntu; libs at /usr/lib/x86_64-linux-gnu/.
          ln -s /usr/include/openssl "$STAGED/include/openssl"
          ln -s /usr/lib/x86_64-linux-gnu/libssl.a "$STAGED/lib/libssl.a" || \
            ln -s /usr/lib/x86_64-linux-gnu/libssl.so "$STAGED/lib/libssl.so"
          ln -s /usr/lib/x86_64-linux-gnu/libcrypto.a "$STAGED/lib/libcrypto.a" || \
            ln -s /usr/lib/x86_64-linux-gnu/libcrypto.so "$STAGED/lib/libcrypto.so"
          echo "AXON_OPENSSL_FIPS_PREBUILT=$STAGED" >> "$GITHUB_ENV"
          echo "Staged at $STAGED:"
          ls -la "$STAGED/include" "$STAGED/lib"

      - name: cargo build with --features fips-openssl (debug + release)
        working-directory: axon-csys-enterprise
        # Debug + release builds catch link errors + cfg-gated
        # compile errors. Both profiles exercise the same FIPS-
        # routed extern declarations + the build script's prebuilt
        # dispatch.
        run: |
          cargo build --features fips-openssl --verbose
          cargo build --release --features fips-openssl --verbose

      - name: cargo test --no-run with --features fips-openssl
        working-directory: axon-csys-enterprise
        # Compiles every test binary under FIPS routing. Catches:
        #   • Rust-side cfg-gated compile errors in tests/crypto.rs
        #   • Feature-flag mismatches between unit + integration tests
        #   • Linker errors specific to test binaries (e.g. duplicate
        #     symbol, missing extern in #[cfg(test)] code path)
        # Does NOT execute the binaries — see the comment block above
        # for why runtime FIPS validation is deferred to 27.h.2.
        run: cargo test --no-run --release --features fips-openssl --verbose

      # Runtime FIPS validation deferred to a future 27.h.2 sub-fase.
      #
      # Rationale: Ubuntu 24.04 ships OpenSSL 3.0.13 with the FIPS
      # provider compiled but NOT activated by default. EVP_MD_fetch
      # with `properties = "fips=yes"` returns NULL because the FIPS
      # provider is not loaded at runtime. To activate it, the runner
      # would need to:
      #   1. Run `openssl fipsinstall -out /etc/ssl/fipsmodule.cnf
      #      -module /usr/lib/x86_64-linux-gnu/ossl-modules/fips.so`
      #      to generate the FIPS module integrity-check config.
      #   2. Edit /etc/ssl/openssl.cnf to load the FIPS provider
      #      (or supply an alternate config via OPENSSL_CONF=...).
      #   3. Verify the FIPS provider is actually in use (e.g. via
      #      `openssl list -providers` showing "fips: ... is FIPS").
      #
      # That setup is a separate piece of CI machinery worth its own
      # sub-fase. For v0.1.0 the build + link + test-compile coverage
      # above is the load-bearing CI signal — runtime drift-gate
      # parity vs OSS pure-C is exercised in the CORE matrix lanes
      # (no-FIPS regime where every HMAC test runs). The crypto.rs
      # test pack's drift-gate assertions vs sha2/hmac crates apply
      # equally to FIPS routing once 27.h.2 lands.
      #
      # Adopters running production federal workloads supply their
      # own NIST-CAVS-validated prebuilts via AXON_OPENSSL_FIPS_PREBUILT
      # / AXON_BORINGSSL_FIPS_PREBUILT (same env-var contract); their
      # adopter-side CI exercises the runtime test path against a
      # properly-activated FIPS provider.
