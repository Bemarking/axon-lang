name: Fase 33 — SSE as Cognitive Primitive

# §Fase 33.g — Dedicated CI workflow exercising the full Fase 33 cycle
# on every PR + master push. D1–D10 ratificadas 2026-05-12; this
# workflow locks the four-layer contract + D12 fuzz at PR time so
# adopter-facing regressions surface BEFORE a release ever ships.
#
# Six parallel lanes:
#
#   1. layer-1-flow-execution-event — cross-stack drift gate. The
#      shared 12-entry corpus at
#      `tests/fixtures/fase33_flow_execution_event/corpus.json` is
#      consumed by both Rust serde + Python dataclass dispatch; if
#      either drifts, exactly one lane fails. Closed-catalog 6-variant
#      `FlowExecutionEvent` invariant.
#
#   2. layer-2-live-event-forwarding — `execute_sse_handler` consumes
#      the FlowExecutionEvent receiver LIVE (no batching). Wire-shape
#      byte-identical with pre-33.c per D9 backwards-compat.
#
#   3. layer-3-native-backend-streaming — per-provider Backend::stream()
#      end-to-end against local axum mock servers. OpenAI-compat SSE
#      covers 4 providers (openai/kimi/glm/ollama/openrouter via the
#      shared OpenAICompatibleBackend); Anthropic SSE + Gemini SSE are
#      the two distinct impls.
#
#   4. layer-4-stream-effect-dispatcher — the algebraic-effect →
#      wire-behavior bridge. `effects: <stream:<policy>>` on a tool
#      declaration MUST surface on the SSE `axon.complete` wire
#      envelope's `stream_policies` array.
#
#   5. d6-cancel-safety — `CancellationFlag` + `CancelOnDrop`
#      cooperative cancellation. Drop guard fires on every scope-exit
#      shape (normal return, ?, panic, task abort); cancel propagation
#      latency < 100ms.
#
#   6. d12-robustness-fuzz — 13 surfaces × ~150 seeds each =
#      ~2 000 deterministic fuzz iterations. Total + never-panic
#      invariant for every public predicate the Fase 33 cycle exposes
#      (LineBuffer, SseEventParser, StreamPolicyEnforcer × 4 policies,
#      CancellationFlag monotone invariant, CancelOnDrop scope-exit,
#      FlowExecutionEvent serde round-trip, BackpressurePolicy slug
#      catalog closure).

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── 1. Layer 1 cross-stack drift gate (Rust + Python) ───────────────
  layer-1-flow-execution-event:
    name: Layer 1 — FlowExecutionEvent cross-stack drift gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-fase33-layer1-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase33-layer1-

      - name: Verify shared corpus shape (≥10 entries, D2 anchor)
        run: |
          python -c "import json; \
                     data = json.load(open('tests/fixtures/fase33_flow_execution_event/corpus.json')); \
                     assert 'entries' in data, 'corpus must carry entries key'; \
                     assert data['d_letter_anchor'].startswith('D2'), 'corpus must anchor to D2'; \
                     assert len(data['entries']) >= 10, f'corpus has only {len(data[\"entries\"])} entries (need >= 10)'"

      - name: Run Rust drift gate (serde round-trip + variant closure)
        working-directory: axon-rs
        run: cargo test --test fase33_flow_execution_event_drift -- --nocapture

      - name: Run Python drift gate (dataclass round-trip + variant closure)
        run: pytest tests/test_fase33_flow_execution_event.py -v --tb=short

      - name: Run Rust lib unit tests for flow_execution_event
        working-directory: axon-rs
        run: cargo test --lib flow_execution_event -- --nocapture

  # ── 2. Layer 2 live FlowExecutionEvent forwarding ───────────────────
  layer-2-live-event-forwarding:
    name: Layer 2 — execute_sse_handler live forwarding
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-fase33-layer2-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase33-layer2-

      - name: Run Fase 33.b anchor regression (stub-path bug fix)
        working-directory: axon-rs
        run: cargo test --test fase33_b_stub_steps_executed_anchor -- --nocapture

      - name: Run Fase 33.c live event forwarding (D9 wire byte-compat)
        working-directory: axon-rs
        run: cargo test --test fase33_c_live_event_forwarding -- --nocapture

      - name: Run Fase 33 diagnostic wire-body anchor
        working-directory: axon-rs
        run: cargo test --test fase33_sse_full_body_diagnostic -- --nocapture

      - name: Run trace_store reserve_id / record_with_id unit tests
        working-directory: axon-rs
        run: cargo test --lib trace_store -- --nocapture --test-threads=1

  # ── 3. Layer 3 per-provider native backend streaming ────────────────
  layer-3-native-backend-streaming:
    name: Layer 3 — Backend::stream() per-provider (4 distinct impls)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-fase33-layer3-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase33-layer3-

      - name: Run shared SSE infrastructure unit tests (LineBuffer + SseEventParser)
        working-directory: axon-rs
        run: cargo test --lib sse_streaming -- --nocapture

      - name: Run OpenAI-compat SSE chunk parser unit tests (covers 4 providers)
        working-directory: axon-rs
        run: cargo test --lib backends::openai_compat -- --nocapture

      - name: Run Anthropic SSE chunk parser unit tests
        working-directory: axon-rs
        run: cargo test --lib backends::anthropic -- --nocapture

      - name: Run Gemini SSE chunk parser unit tests
        working-directory: axon-rs
        run: cargo test --lib backends::gemini -- --nocapture

      - name: Run E2E integration tests (local axum mock servers)
        working-directory: axon-rs
        run: cargo test --test fase33_d_native_backend_streaming -- --nocapture

  # ── 4. Layer 4 stream-effect dispatcher ─────────────────────────────
  layer-4-stream-effect-dispatcher:
    name: Layer 4 — stream-effect dispatcher (algebraic effect → wire)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-fase33-layer4-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase33-layer4-

      - name: Run stream-effect dispatcher unit tests (resolver + enforcer)
        working-directory: axon-rs
        run: cargo test --lib stream_effect_dispatcher -- --nocapture

      - name: Run Stream<T> runtime unit tests (4 policy semantics)
        working-directory: axon-rs
        run: cargo test --lib stream_runtime -- --nocapture

      - name: Run Fase 33.e integration (axon.complete carries stream_policies)
        working-directory: axon-rs
        run: cargo test --test fase33_e_stream_effect_layer -- --nocapture

  # ── 5. D6 cancel-safety ─────────────────────────────────────────────
  d6-cancel-safety:
    name: D6 — cancel-safety (CancellationFlag + CancelOnDrop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-fase33-cancel-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase33-cancel-

      - name: Run cancel_token unit tests (12 tests, monotone + drop guard)
        working-directory: axon-rs
        run: cargo test --lib cancel_token -- --nocapture --test-threads=1

      - name: Run Fase 33.f cancel-safety integration (8 tests, sub-100ms budget)
        working-directory: axon-rs
        run: cargo test --test fase33_f_cancel_safety -- --nocapture

  # ── 6. D12 robustness fuzz ──────────────────────────────────────────
  #
  # 13 surfaces × ~150 seeds each = ~2 000 deterministic iterations.
  # Total + never-panic invariant for every public predicate the
  # Fase 33 cycle exposes. Deterministic per-seed; regressions
  # reproduce verbatim from the seed printed on failure.
  d12-robustness-fuzz:
    name: D12 robustness fuzz (~2 000 iters)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-fase33-fuzz-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase33-fuzz-

      - name: D12 fuzz over the 13 Fase 33 surfaces
        working-directory: axon-rs
        run: cargo test --test fase33_fuzz -- --nocapture

  # ── 7. Backwards-compat anchor: Fase 30/31/32 wire shape unchanged ──
  backwards-compat-anchor:
    name: D9 backwards-compat — Fase 30/31/32 wire byte-identical
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-fase33-d9-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase33-d9-

      - name: Fase 30 SSE runtime (no regression on token + complete wire shape)
        working-directory: axon-rs
        run: |
          cargo test --test fase30_sse_runtime -- --nocapture
          cargo test --test fase30_keepalive -- --nocapture
          cargo test --test fase30_negotiation -- --nocapture
          cargo test --test fase30_sse_fuzz -- --nocapture

      - name: Fase 31 type-driven transport (no regression on inference + warning)
        working-directory: axon-rs
        run: |
          cargo test --test fase31_strict_mode -- --nocapture
          cargo test --test fase31_diagnostic_header -- --nocapture
          cargo test --test fase31_flag_surface -- --nocapture

      - name: Fase 32 dynamic-route transport (no regression on per-route SSE)
        working-directory: axon-rs
        run: |
          cargo test --test fase32_dynamic_transport -- --nocapture
          cargo test --test fase32_routes_drift -- --nocapture
          cargo test --test fase32_l_kivi_disjunct_a_end_to_end -- --nocapture
