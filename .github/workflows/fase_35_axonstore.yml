name: Fase 35 — axonstore Cognitive Data Plane

# §Fase 35.l — Dedicated CI workflow for the `axonstore` cognitive
# data plane. D14 ratificada 2026-05-15; this workflow is the harness
# that spins a real Postgres service container so the four-pillar
# implementation is proven against an actual database on every PR +
# master push — adopter-facing regressions surface BEFORE a release.
#
# Three parallel lanes:
#
#   1. axonstore-runtime — the no-database Rust surface: the store
#      module unit tests (filter compiler, PostgresStoreBackend SQL
#      builders, StoreRegistry, epistemic, audit-chain, capability,
#      row-stream drain), the 35.a diagnostic anchor, and the 35.k
#      D13 fuzz pack (~24 000 deterministic LCG iterations).
#
#   2. real-postgres — the D14 floor: a `postgres:16` SERVICE
#      container + `AXON_TEST_DATABASE_URL`, running the 35.l
#      integration suite end-to-end against real rows, a real cursor,
#      real type decoding, real backpressure bounds, real injection
#      resistance.
#
#   3. frontend-capability — the 35.j Pillar IV compile-time
#      enforcement: the type-checker's endpoint→flow→gated-store
#      compositional check.

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── 1. No-database Rust surface: store units + anchor + fuzz ────────
  axonstore-runtime:
    name: axonstore runtime — store units + anchor + D13 fuzz
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs

      - name: Store module unit tests
        working-directory: axon-rs
        run: |
          cargo test --lib store:: -- --nocapture

      - name: Fase 35.a — axonstore gap diagnostic anchor
        working-directory: axon-rs
        run: cargo test --test fase35_a_axonstore_gap_diagnostic

      - name: Fase 35.k — D13 robustness fuzz pack
        working-directory: axon-rs
        run: cargo test --test fase35_fuzz

  # ── 2. D14 floor: real Postgres service container ───────────────────
  real-postgres:
    name: Fase 35.l — real-Postgres integration (D14)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: axon
          POSTGRES_PASSWORD: axon
          POSTGRES_DB: axon_store_test
        ports:
          - 5432:5432
        # Hold the job until Postgres is accepting connections.
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AXON_TEST_DATABASE_URL: postgres://axon:axon@localhost:5432/axon_store_test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs

      - name: Fase 35.l — all four pillars end-to-end vs a real database
        working-directory: axon-rs
        run: cargo test --test fase35_l_postgres_integration -- --nocapture

  # ── 3. Pillar IV compile-time enforcement (frontend type-checker) ───
  frontend-capability:
    name: Fase 35.j — capability-typed access (type-checker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-frontend

      - name: Fase 35.j — endpoint→flow→gated-store compositional check
        working-directory: axon-frontend
        run: cargo test --lib -- fase35j_capability

  # ── Cycle summary ───────────────────────────────────────────────────
  fase-35-summary:
    name: Fase 35 cycle CI summary
    runs-on: ubuntu-latest
    needs:
      - axonstore-runtime
      - real-postgres
      - frontend-capability
    steps:
      - name: Fase 35 cycle CI
        run: |
          echo "🎉 Fase 35 cycle CI — ALL 3 LANES GREEN."
          echo ""
          echo "The axonstore cognitive data plane, proven:"
          echo "  D1-D7  substrate    — filter compiler, PostgresStoreBackend,"
          echo "                        StoreRegistry, both execution paths"
          echo "  D8     Pillar I     — epistemic: rows born Untrusted,"
          echo "                        confidence_floor enforced"
          echo "  D9     Pillar II    — audit-chain: HMAC-Merkle mutation log"
          echo "  D10    Pillar III   — Stream<Row>: lazy cursor + backpressure"
          echo "  D11    Pillar IV    — capability-typed access, type-checked"
          echo "  D13    fuzz         — ~24 000 LCG iters, never-panic + D4"
          echo "  D14    real Postgres — all four pillars vs an actual database"
