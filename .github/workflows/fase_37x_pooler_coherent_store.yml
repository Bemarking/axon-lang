name: Fase 37.x — Pooler-Coherent Store Contract

# §Fase 37.x.j — Dedicated CI workflow for the Pooler-Coherent Store
# Contract (axon-lang v1.37.0). D1-D9 RATIFIED 2026-05-19; this workflow
# is the regression guard for the WHOLE 37.x contract — every PR + master
# push exercises the four sub-surfaces below in parallel.
#
# The Fase 35 workflow (.github/workflows/fase_35_axonstore.yml) remains
# the broad cognitive-data-plane regression guard (four pillars + Gap 3).
# This 37.x workflow is the focused, contract-specific guard: pure
# builders + filter unit, the transaction-pooler integration owning the
# faithful smoke-15 reproduction, the typed-I/O property/fuzz pack, and
# the D5 zero-regression corpus from Fase 35 routed through the pooler.
#
# Four parallel lanes:
#
#   1. pure-builders-and-filter — the no-database pure-Rust surface:
#      every store module unit test (filter compiler, the 4 SQL
#      builders incl. the D2 schema-qualified relation, StoreError /
#      SchemaVerifyReport / SchemaCache, classify_pg_type,
#      resolve_from_rows, is_schema_drift_sqlstate, the deploy-time
#      verification report types) + the 37.x.a diagnostic anchor (the
#      3 infra-free §-assertions §1/§2/§5).
#
#   2. transaction-pooler-integration — the FAITHFUL smoke-15
#      reproduction lane. Postgres 16 service container + PgBouncer
#      `pool_mode=transaction` (DEFAULT_POOL_SIZE=5 ≪ parallel test
#      count → cross-session multiplexing is FORCED). Runs:
#        * fase37x_i_pgbouncer_integration — t1 smoke-15 + t2 pool
#          churn + t3 forced miss + t4 D9 self-heal under pooler;
#        * fase37x_a_pooler_coherent_diagnostic — the 5 anchor tests
#          (§1/§2/§5 pure + §3/§4 real-DB), now INVERTED guards.
#      Without ALL of D1-D4 + D9 this lane fails the post-37.x.a
#      smoke-15 chain.
#
#   3. typed-io-property-fuzz — the pure-total property pack
#      (~7 500 deterministic LCG iters, no DB). Three surfaces:
#      `resolve_from_rows` totality (D1); `build_pg_where` totality +
#      injection-resistance + 37.x.e `::text` invariant (D4);
#      `is_schema_drift_sqlstate` closed-set + `StoreError::is_schema_drift`
#      variant agreement (D9).
#
#   4. d5-fase35-regression — the broad Fase 35 store-integration
#      regression corpus routed through the transaction-mode pooler.
#      D5 absolute: a healthy store is BYTE-IDENTICAL post-37.x. This
#      lane is the cross-cycle guarantee — every Fase 35 invariant
#      must continue to hold behind PgBouncer transaction mode.

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── 1. Pure builders + filter unit — no database ────────────────────
  pure-builders-and-filter:
    name: 37.x pure surface — builders + filter + anchor §1/§2/§5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs

      - name: Store-module unit tests (filter, builders, registry, cache)
        working-directory: axon-rs
        run: |
          cargo test --lib store::

      - name: Fase 37.x.a — pure-surface diagnostic anchors (§1/§2/§5)
        working-directory: axon-rs
        run: |
          cargo test --test fase37x_a_pooler_coherent_diagnostic \
            -- --nocapture \
            s1_unknown_type_equality_filter_casts_the_column_to_text \
            s2_operation_sql_is_schema_qualified_when_resolved \
            s5_all_four_sql_builders_qualify_with_a_resolved_schema

  # ── 2. Transaction-pooler integration — the smoke-15 reproduction ───
  transaction-pooler-integration:
    name: 37.x transaction-pooler integration — smoke-15 + anchors
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: axon
          POSTGRES_PASSWORD: axon
          POSTGRES_DB: axon_store_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      # A transaction-mode pooler. `DEFAULT_POOL_SIZE: 5` is deliberately
      # small — well below the parallel test count — so cross-session
      # multiplexing IS forced, exactly reproducing the production
      # condition under which the v1.36.5 codepath died.
      pgbouncer:
        image: edoburu/pgbouncer:latest
        env:
          DB_HOST: postgres
          DB_PORT: "5432"
          DB_USER: axon
          DB_PASSWORD: axon
          DB_NAME: axon_store_test
          POOL_MODE: transaction
          AUTH_TYPE: scram-sha-256
          DEFAULT_POOL_SIZE: "5"
          MAX_CLIENT_CONN: "200"
          LISTEN_PORT: "6432"
        ports:
          - 6432:6432
    env:
      # Route through PgBouncer (port 6432), not direct to Postgres.
      # The 37.x contract's load-bearing reproduction context.
      AXON_TEST_DATABASE_URL: postgres://axon:axon@localhost:6432/axon_store_test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs

      - name: Wait for the transaction-mode pooler (end-to-end probe)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client
          for i in $(seq 1 30); do
            if PGPASSWORD=axon psql -h localhost -p 6432 -U axon \
                 -d axon_store_test -tAc 'SELECT 1' >/dev/null 2>&1; then
              echo "PgBouncer → Postgres path is live (transaction mode)."
              exit 0
            fi
            echo "waiting for pgbouncer ($i/30)…"
            sleep 2
          done
          echo "::error::PgBouncer did not become ready" >&2
          exit 1

      - name: Fase 37.x.i — faithful smoke-15 reproduction (PgBouncer)
        working-directory: axon-rs
        # t1 smoke-15 (uuid PK, non-default schema) + t2 pool churn
        # (20 ops × 2 tables, default_pool_size=5 forces multiplexing)
        # + t3 forced cache miss (every iter runs the D3 transaction)
        # + t4 D9 self-heal under the pooler. Without D1+D2+D3+D4 the
        # canonical agent flow dies `operator does not exist: uuid =
        # text` on the very first retrieve.
        run: cargo test --test fase37x_i_pgbouncer_integration -- --nocapture

      - name: Fase 37.x.a — full diagnostic-anchor suite (PgBouncer)
        working-directory: axon-rs
        # Anchor inversions: §1 unknown-type equality `::text` fallback;
        # §2 schema-qualified operation SQL; §3 D9 self-heal after a
        # live ALTER; §4 multi-schema resolution; §5 the 4 builders all
        # qualify. Re-running these under the pooler proves they hold
        # on a session topology where introspection and operation can
        # otherwise split. Now regression guards, not failing pins.
        run: cargo test --test fase37x_a_pooler_coherent_diagnostic -- --nocapture

  # ── 3. Typed-I/O property/fuzz — pure, no database ──────────────────
  typed-io-property-fuzz:
    name: 37.x typed-I/O property/fuzz — ~7 500 LCG iters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs

      - name: Fase 37.x.i — Surface A/B/C property/fuzz pack
        working-directory: axon-rs
        # Surface A — `resolve_from_rows` totality (2 500 iters, D1).
        # Surface B — `build_pg_where` totality + injection-resistance
        #             across the known/unknown × eq/ord/LIKE matrix +
        #             the 37.x.e `::text` invariant (4 000 iters, D4).
        # Surface C — `is_schema_drift_sqlstate` closed-set + every
        #             `StoreError::is_schema_drift()` variant agreement
        #             (1 000 iters + neighbour SQLSTATEs + case-shifted
        #             variants, D9).
        run: cargo test --test fase37x_i_property_fuzz -- --nocapture

  # ── 4. D5 zero-regression — Fase 35 store corpus through PgBouncer ──
  d5-fase35-regression:
    name: 37.x D5 zero-regression — Fase 35 corpus vs PgBouncer
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: axon
          POSTGRES_PASSWORD: axon
          POSTGRES_DB: axon_store_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      pgbouncer:
        image: edoburu/pgbouncer:latest
        env:
          DB_HOST: postgres
          DB_PORT: "5432"
          DB_USER: axon
          DB_PASSWORD: axon
          DB_NAME: axon_store_test
          POOL_MODE: transaction
          AUTH_TYPE: scram-sha-256
          DEFAULT_POOL_SIZE: "5"
          MAX_CLIENT_CONN: "200"
          LISTEN_PORT: "6432"
        ports:
          - 6432:6432
    env:
      AXON_TEST_DATABASE_URL: postgres://axon:axon@localhost:6432/axon_store_test
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs

      - name: Wait for the transaction-mode pooler (end-to-end probe)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client
          for i in $(seq 1 30); do
            if PGPASSWORD=axon psql -h localhost -p 6432 -U axon \
                 -d axon_store_test -tAc 'SELECT 1' >/dev/null 2>&1; then
              echo "PgBouncer → Postgres path is live (transaction mode)."
              exit 0
            fi
            echo "waiting for pgbouncer ($i/30)…"
            sleep 2
          done
          echo "::error::PgBouncer did not become ready" >&2
          exit 1

      - name: D5 zero-regression — fase35_l vs PgBouncer
        # The full Fase 35 integration corpus — every cognitive-data-plane
        # surface (substrate, four pillars, type mapping, audit chain,
        # capability gate, stream cursor, dynamic-route bind plumbing) —
        # routed through PgBouncer. D5 is an ABSOLUTE: a healthy store
        # is byte-identical post-37.x. Any divergence here is a 37.x
        # regression on the existing contract.
        working-directory: axon-rs
        run: cargo test --test fase35_l_postgres_integration -- --nocapture

      - name: D5 zero-regression — fase37_d filter-injection corpus
        working-directory: axon-rs
        # The 37.x.e equality fallback rendered `"col"::text = $N` —
        # the post-37.x.e shape these tests assert. The lane proves the
        # injection-resistance invariants survive under the pooler.
        run: cargo test --test fase37_d_filter_injection -- --nocapture

      - name: D5 zero-regression — fase37_g request-binding fuzz
        working-directory: axon-rs
        # The Fase 37 Request Binding Contract's totality fuzz — the
        # same `${param}`→`$N` plumbing 37.x consumes from. Holds under
        # the pooler.
        run: cargo test --test fase37_g_request_binding_fuzz -- --nocapture

      - name: D5 zero-regression — fase35_fuzz robustness pack
        working-directory: axon-rs
        # ~18 000 LCG iters across 6 surfaces (filter, classifiers,
        # epistemic, audit chain, store resolution, SQL builders).
        # Pure — no DB needed — but runs in the pooler lane to keep
        # the 37.x guard self-contained.
        run: cargo test --test fase35_fuzz -- --nocapture

  # ── Cycle summary ───────────────────────────────────────────────────
  fase-37x-summary:
    name: Fase 37.x cycle CI summary
    runs-on: ubuntu-latest
    needs:
      - pure-builders-and-filter
      - transaction-pooler-integration
      - typed-io-property-fuzz
      - d5-fase35-regression
    steps:
      - name: Fase 37.x cycle CI
        run: |
          echo "🎉 Fase 37.x cycle CI — ALL 4 LANES GREEN."
          echo ""
          echo "The Pooler-Coherent Store Contract, proven end to end:"
          echo "  D1     search-path-independent resolution — `pg_catalog`,"
          echo "         never `search_path`"
          echo "  D2     schema-anchored operation SQL — resolves on any session"
          echo "  D3     one coherent introspect+operate transaction — pinned"
          echo "         backend behind the pooler"
          echo "  D4     equality type-agnostic fallback — `\"col\"::text = \$N`"
          echo "  D5     symmetric across retrieve/persist/mutate/purge/stream"
          echo "         + ABSOLUTE backwards-compat (this workflow's D5 lane)"
          echo "  D6     honest unresolved-table failure with actionable Display"
          echo "  D7     transaction-pooler CI lane (THIS workflow's lane 2/4)"
          echo "  D8     eager deploy-time schema resolution — unresolvable"
          echo "         table fails the deploy"
          echo "  D9     self-healing capacity-bounded LRU schema cache —"
          echo "         drift SQLSTATE evicts + retries once"
          echo ""
          echo "Faithful smoke-15 reproduction: GREEN."
          echo "axon-lang v1.37.0 — adopter's typed-column store I/O succeeds"
          echo "on every pooled session, not just a lucky one."
