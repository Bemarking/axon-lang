name: Audit Evidence

# Produces a deterministic audit-evidence bundle for every release and
# every push to the main branch.  The bundle is the artifact that
# external auditors (SOC 2, ISO 27001, FIPS 140-3, CC EAL 4+) expect to
# see attached to a point-in-time build.
#
# Outputs (as workflow artifacts):
#   * audit-gap-<framework>.json    — per-framework gap analysis
#   * program_sbom.json             — deterministic SBOM
#   * program_dossier.json          — regulatory compliance dossier
#   * in_toto_statement.json        — SLSA Provenance v1 attestation
#   * evidence-<program>.zip        — full audit evidence ZIP
#   * EVIDENCE_SHA256.txt           — SHA-256 of every emitted artifact
#
# The workflow is a TEMPLATE — adopters should:
#   1. Replace `PROGRAMS` with the list of their own .axon sources.
#   2. Extend `frameworks` if they only care about a subset.
#   3. Wire the generated ZIP to their artifact store (S3 object-lock /
#      GitHub release asset) so auditors can sample by commit SHA.

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  # Required only if you emit a signed attestation to GitHub Releases:
  # id-token: write
  # attestations: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  audit-evidence:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # One job per .axon program in scope for audit.
        program:
          - examples/healthcare_reference.axon
          - examples/banking_reference.axon
          - examples/government_reference.axon
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install axon-lang (pinned)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tools]"

      - name: Verify program compiles
        run: axon check ${{ matrix.program }}

      - name: Derive program slug
        id: slug
        run: |
          slug="$(basename '${{ matrix.program }}' .axon)"
          echo "slug=${slug}" >> "$GITHUB_OUTPUT"

      - name: Prepare output directory
        run: mkdir -p artifacts/${{ steps.slug.outputs.slug }}

      - name: Run per-framework gap analysis
        run: |
          for fw in soc2 iso27001 fips cc; do
            axon audit ${{ matrix.program }} \
              --framework "$fw" \
              -o artifacts/${{ steps.slug.outputs.slug }}/audit_${fw}.json
          done

      - name: Aggregated gap analysis (all frameworks)
        run: |
          axon audit ${{ matrix.program }} \
            --framework all \
            -o artifacts/${{ steps.slug.outputs.slug }}/audit_all.json

      - name: Emit SBOM
        run: |
          axon sbom ${{ matrix.program }} \
            -o artifacts/${{ steps.slug.outputs.slug }}/program_sbom.json

      - name: Emit compliance dossier
        run: |
          axon dossier ${{ matrix.program }} \
            -o artifacts/${{ steps.slug.outputs.slug }}/program_dossier.json

      - name: Build evidence package (deterministic ZIP)
        run: |
          axon evidence-package ${{ matrix.program }} \
            -o artifacts/${{ steps.slug.outputs.slug }}/evidence.zip \
            --note "Auto-generated by CI for commit ${GITHUB_SHA} on $(date -u +%Y-%m-%dT%H:%M:%SZ)"

      - name: Hash every emitted artifact
        working-directory: artifacts/${{ steps.slug.outputs.slug }}
        run: |
          (cd . && sha256sum *.json *.zip) > EVIDENCE_SHA256.txt
          cat EVIDENCE_SHA256.txt

      - name: Fail the build if readiness < threshold
        # Optional guard: keep merges green only if the code-side
        # controls already pass.  Pending_external is tolerated — it
        # requires an accredited lab / CPA firm.
        env:
          READINESS_FLOOR: "80"
        run: |
          python - <<'PY'
          import json, os, sys
          path = "artifacts/${{ steps.slug.outputs.slug }}/audit_all.json"
          data = json.loads(open(path).read())
          floor = float(os.environ["READINESS_FLOOR"])
          failed = []
          for name, summary in data["summary"].items():
              pct = summary["readiness_percent"]
              print(f"{name}: {pct:.1f}% ready ({summary['ready']}/{summary['total']})")
              if pct < floor:
                  failed.append((name, pct))
          if failed:
              print("Frameworks below floor:", failed, file=sys.stderr)
              sys.exit(1)
          PY

      - name: Upload evidence artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-evidence-${{ steps.slug.outputs.slug }}-${{ github.sha }}
          path: artifacts/${{ steps.slug.outputs.slug }}/
          retention-days: 365

      # Opt-in: publish the evidence ZIP as a release asset on tag push.
      - name: Attach evidence ZIP to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/${{ steps.slug.outputs.slug }}/evidence.zip
            artifacts/${{ steps.slug.outputs.slug }}/EVIDENCE_SHA256.txt
