name: Enterprise Release

# Builds and publishes the axon-enterprise container image to Amazon ECR
# Private on every `v*` tag.  The image bundles the pinned axon-lang
# Rust binary with the Python enterprise layer (RBAC, SSO, Audit,
# Metering, Observability, Studio).
#
# ─── Prerequisites (configured once, out-of-band) ──────────────────
#
# 1. Amazon ECR Private repository (namespace matches the
#    account-wide convention: `axon/<component>`):
#        aws ecr create-repository \
#          --repository-name axon/axon-enterprise \
#          --image-scanning-configuration scanOnPush=true \
#          --image-tag-mutability IMMUTABLE
#
# 2. IAM role `github-actions-enterprise-publisher` in the account
#    that owns the ECR repo, with:
#
#      • Trust policy: GitHub OIDC provider
#        (token.actions.githubusercontent.com), condition
#        `sub: repo:Bemarking/axon-enterprise:ref:refs/tags/v*`
#
#      • Permission policy: ecr:GetAuthorizationToken (resource: *)
#        plus push permissions on the `axon/axon-enterprise` repo ARN:
#          ecr:BatchCheckLayerAvailability,
#          ecr:InitiateLayerUpload, ecr:UploadLayerPart,
#          ecr:CompleteLayerUpload, ecr:PutImage, ecr:BatchGetImage
#
# 3. Repository-level GitHub variables:
#      AWS_ACCOUNT_ID   — 12-digit AWS account owning the ECR repo
#      AWS_REGION       — region of the ECR repo (e.g., us-east-1)
#
# 4. Grant pull permission to each enterprise customer via an ECR
#    repository policy (cross-account) or per-customer IAM user.
#
# Tagging strategy:
#   - vX.Y.Z  (exact, immutable — the canonical production tag)
#   - X.Y     NOT published: a mutable "minor float" is fundamentally
#             incompatible with the repo's IMMUTABLE tag policy (the
#             first minor release would succeed, every subsequent one
#             would fail at push time). Operators pin to exact vX.Y.Z.
#   - latest  intentionally NOT published: operators must pin.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to release (e.g. v1.0.0)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # Required for OIDC → AWS STS

env:
  ECR_REPOSITORY: axon/axon-enterprise
  # Opt into Node.js 24 for every JavaScript action in this workflow.
  # GitHub will force Node 24 by default starting 2026-06-02 and remove
  # Node 20 from runners on 2026-09-16. Setting the flag now means the
  # workflow keeps working through the transition without waiting for
  # each individual action (actions/checkout, docker/build-push, …) to
  # ship a Node-24 major bump.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-push:
    name: Build + push multi-arch image
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        id: ver
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if ! echo "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([.-].+)?$'; then
            echo "Invalid tag: $TAG (expected vX.Y.Z or vX.Y.Z-suffix)" >&2
            exit 1
          fi
          VER="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Release: tag=$TAG version=$VER"

      - name: Resolve pinned axon-lang version from pyproject
        id: axon
        run: |
          set -euo pipefail
          AXON=$(python - <<'PY'
          import tomllib, sys
          with open("pyproject.toml", "rb") as f:
              t = tomllib.load(f)
          for dep in t["project"]["dependencies"]:
              if dep.startswith("axon-lang"):
                  # Supports >=, ==, ~= specifiers.
                  for op in (">=", "==", "~="):
                      if op in dep:
                          print(dep.split(op, 1)[1].strip())
                          sys.exit(0)
              # Fallthrough: unknown spec format
          sys.exit("Could not parse axon-lang pin from pyproject.toml")
          PY
          )
          echo "version=$AXON" >> "$GITHUB_OUTPUT"
          echo "axon-lang pin: $AXON"

      - name: Set build metadata
        id: meta
        run: |
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"
          echo "vcs_ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      # ────────────────────────────────────────────────────────────
      # Wait for axon-lang to publish its Rust binaries — with CDN
      # consistency probe.
      #
      # Race-condition history:
      #   v1.13.0 (2026-05-11) — HEAD probe returned 200 at minute 7
      #   (asset just uploaded), but `docker/build-push-action`'s
      #   internal `curl` got 404 23 seconds later. Root cause: GitHub
      #   Releases CDN propagates the new asset to edge nodes
      #   asynchronously. The runner's HEAD hit an edge that already
      #   had the asset; the Docker build's GET (via a different
      #   network path inside buildx) hit an edge that didn't yet.
      #
      # Fix: a TWO-PHASE probe.
      #
      #   Phase 1 — availability: poll HEAD every 30s until 1 success
      #     (asset record exists somewhere in the CDN).
      #   Phase 2 — consistency: do `CONSISTENCY_PROBES` (default 3)
      #     consecutive successful range-GETs spaced
      #     `CONSISTENCY_INTERVAL` (default 15s) apart. The GET issues
      #     a `Range: bytes=0-0` request — confirms the storage layer
      #     actually serves bytes (HEAD can pass on edge-cached metadata
      #     even before storage replication is complete). Three
      #     consecutive successes signal propagation across all the
      #     edges the workflow's network paths touch.
      #
      # Total worst-case overhead added: ~45s beyond the Phase 1
      # success. Cheap insurance against the ECR-image-missing failure
      # mode that blocks every adopter pull until the release workflow
      # is manually re-run.
      #
      # We probe only `axon-linux-x86_64.tar.gz` — the Dockerfile
      # downloads exactly that asset (linux/amd64 platform), and the
      # axon-lang release workflow publishes assets in a single
      # `softprops/action-gh-release` invocation, so seeing this one
      # is sufficient evidence the rest are also live.
      # ────────────────────────────────────────────────────────────
      - name: Wait for axon-lang Rust binaries (with CDN-consistency probe)
        env:
          CONSISTENCY_PROBES: "3"
          CONSISTENCY_INTERVAL: "15"
        run: |
          set -euo pipefail
          AXON_VER="${{ steps.axon.outputs.version }}"
          ASSET_URL="https://github.com/Bemarking/axon-lang/releases/download/v${AXON_VER}/axon-linux-x86_64.tar.gz"
          DEADLINE=$((SECONDS + 1500))   # 25 minutes for Phase 1
          POLL_INTERVAL=30

          # ── Phase 1 — availability (HEAD until first success) ────
          attempt=0
          while true; do
            attempt=$((attempt + 1))
            if curl --silent --location --fail --head "$ASSET_URL" -o /dev/null; then
              echo "✓ Phase 1: asset advertised after ${SECONDS}s (attempt $attempt): $ASSET_URL"
              break
            fi
            if [ "$SECONDS" -ge "$DEADLINE" ]; then
              echo "::error::Phase 1 timed out after 25 min waiting for $ASSET_URL"
              echo "::error::The axon-lang \`Rust Release Binaries\` workflow may have failed."
              echo "::error::Inspect: gh run list --repo Bemarking/axon-lang --workflow=\"Rust Release Binaries\""
              exit 1
            fi
            echo "  Phase 1 attempt $attempt — asset not yet available, sleeping ${POLL_INTERVAL}s (elapsed: ${SECONDS}s / 1500s)"
            sleep "$POLL_INTERVAL"
          done

          # ── Phase 2 — CDN consistency (N consecutive byte-fetches) ─
          # A real GET (range request: 1 byte) confirms the storage
          # layer is actually serving the asset, not just an edge
          # cache reporting "exists" via HEAD. N consecutive successes
          # spaced CONSISTENCY_INTERVAL seconds apart give time for
          # asynchronous CDN propagation to converge across edges.
          echo ""
          echo "── Phase 2: CDN consistency probe (${CONSISTENCY_PROBES} consecutive byte-fetches, ${CONSISTENCY_INTERVAL}s apart) ──"
          consistency_attempts=0
          consecutive_successes=0
          consistency_deadline=$((SECONDS + 600))   # 10 min hard cap for Phase 2
          while [ "$consecutive_successes" -lt "$CONSISTENCY_PROBES" ]; do
            consistency_attempts=$((consistency_attempts + 1))
            # `--range 0-0` = fetch first byte only. `--fail` ⇒ non-zero on any 4xx/5xx.
            # `-o /dev/null` ⇒ discard the byte; we only care about exit status.
            if curl --silent --location --fail --range 0-0 "$ASSET_URL" -o /dev/null; then
              consecutive_successes=$((consecutive_successes + 1))
              echo "  ✓ Phase 2 GET probe $consistency_attempts/$consistency_attempts — success ($consecutive_successes/$CONSISTENCY_PROBES consecutive)"
            else
              # Any failure resets the consecutive-success counter — we
              # need N IN A ROW to declare convergence.
              consecutive_successes=0
              echo "  × Phase 2 GET probe $consistency_attempts — 4xx/5xx, resetting consecutive counter to 0"
            fi
            if [ "$SECONDS" -ge "$consistency_deadline" ]; then
              echo "::error::Phase 2 timed out after 10 min — CDN never converged on $ASSET_URL"
              echo "::error::Manual intervention required: verify the release assets are present, then re-run this workflow."
              exit 1
            fi
            if [ "$consecutive_successes" -lt "$CONSISTENCY_PROBES" ]; then
              sleep "$CONSISTENCY_INTERVAL"
            fi
          done
          echo ""
          echo "✓ Phase 2: $CONSISTENCY_PROBES consecutive successful GETs confirm CDN coherence."
          echo "Total wait: ${SECONDS}s (Phase 1 + Phase 2)."

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/github-actions-enterprise-publisher
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: gha-enterprise-${{ steps.ver.outputs.version }}

      - name: Login to Amazon ECR Private
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify ECR repository exists
        run: |
          set -euo pipefail
          aws ecr describe-repositories \
            --repository-names "${{ env.ECR_REPOSITORY }}" \
            --region "${{ vars.AWS_REGION }}" >/dev/null

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.enterprise
          # linux/arm64 is deferred until axon-lang publishes an
          # `axon-linux-aarch64.tar.gz` release asset.  Adding it back
          # is a one-line change once upstream ships the binary.
          platforms: linux/amd64
          push: true
          provenance: mode=max
          sbom: true
          build-args: |
            AXON_VERSION=${{ steps.axon.outputs.version }}
            IMAGE_VERSION=${{ steps.ver.outputs.version }}
            VCS_REF=${{ steps.meta.outputs.vcs_ref }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.ver.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.vcs_ref }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}

      - name: Image pull commands (summary)
        run: |
          REG="${{ steps.login-ecr.outputs.registry }}"
          REPO="${{ env.ECR_REPOSITORY }}"
          VER="${{ steps.ver.outputs.version }}"
          {
            echo "## Published image"
            echo ""
            echo "| Tag | Pull command |"
            echo "|---|---|"
            echo "| \`${VER}\` | \`docker pull ${REG}/${REPO}:${VER}\` |"
            echo ""
            echo "bundles \`axon-lang\` **${{ steps.axon.outputs.version }}** (Rust binary) + axon-enterprise **${VER}**"
          } >> "$GITHUB_STEP_SUMMARY"
