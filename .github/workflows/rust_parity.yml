name: Rust ↔ Python IR Parity

# Structural parity gate between the Python reference implementation
# (axon/) and the Rust native runtime (axon-rs/). Compiles every
# fixture under axon-rs/tests/parity/*.axon with both runtimes and
# verifies the produced IR JSONs agree on structure (counts of each
# primitive + compliance lists + named identifiers).
#
# Byte-identical parity is NOT yet gated here — known divergences are
# documented in docs/fase8_parity_divergences.md and tracked as
# sub-phases §8.2.h.1 … §8.2.h.4. Once those land, this workflow will
# be extended to add a `diff -q` step.

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  # Opt into Node.js 24 for every JavaScript action — GitHub deprecates
  # Node 20 on 2026-09-16; default flips on 2026-06-02.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  structural-parity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install axon-lang (reference runtime)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tools]"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Regenerate Python golden for the canonical fixture
        working-directory: .
        run: |
          python -m axon.cli compile \
            axon-rs/tests/parity/fase1_through_5_plus_compliance.axon \
            -o axon-rs/tests/parity/fase1_through_5_plus_compliance.python.ir.json

      - name: Run structural parity test (Rust side consumes the golden)
        working-directory: axon-rs
        run: cargo test --test integration parity_fase1_5 -- --nocapture

      - name: Upload golden + Rust-derived IR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rust-python-parity-artifacts
          path: |
            axon-rs/tests/parity/*.axon
            axon-rs/tests/parity/*.json
          retention-days: 90

  # Byte-identical diff between Python golden and Rust IR JSON output.
  # Activated after §8.2.h.1 (dataspace_specs removed), §8.2.h.2 (intention_tree
  # ported) and §8.2.h.3 (Option<T> collapsed to concrete defaults).
  byte-identical-parity:
    runs-on: ubuntu-latest
    needs: structural-parity
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - name: Install axon-lang
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tools]"

      - name: Regenerate Python golden for canonical fixture
        run: |
          python -m axon.cli compile \
            axon-rs/tests/parity/fase1_through_5_plus_compliance.axon \
            -o axon-rs/tests/parity/fase1_through_5_plus_compliance.python.ir.json

      - name: Run byte-identical parity gate
        working-directory: axon-rs
        run: cargo test --test integration parity_fase1_5_byte -- --nocapture
