# §Fase 33.z.h — Dedicated CI workflow for the 33.z cycle.
#
# Runs every 33.z test surface on every push/PR so the cycle's
# contract (D1 single hot path / D2 W002 unreachable / D3 cancel
# propagation / D4 wire byte-compat / D5 axon.tool_call SSE / D7
# sync↔async parity / D8 legacy retirement / D9 wire byte-compat /
# D10 cross-stack Python↔Rust / D11 closed-catalog discipline /
# D12 production-grade fuzz) stays observable across the cycle's
# deliverables. Separate from `fase_33y_dispatcher.yml` (33.y
# per-IRFlowNode dispatcher test surface) + `fase_33x_runtime_activation.yml`
# (33.x runtime-activation cycle) so the 33.z production-wiring CI
# surface is coherent + searchable.
#
# # What this workflow runs
#
# Each sub-fase's test pack runs in its own job for clear failure
# attribution. The 6 post-33.z.e surviving lanes (33.z.a anchor +
# 33.z.c default-on / tool_call + 33.z.d parity corpus + 33.z.e
# legacy-retirement grep gate + 33.z.f cross-stack Python parity +
# 33.z.g production-grade fuzz) each get a dedicated lane. A final
# `summary` job depends on all of them so the master CI status
# check is single-source-of-truth for the cycle's contract.
#
# # Why no 33.z.b lane?
#
# The 33.z.b graft-skeleton test file (`tests/fase33z_b_graft_skeleton.rs`)
# was DELETED in 33.z.e — its premise (flag-ON vs flag-OFF parity)
# dissolved with the deletion of the `AXON_STREAMING_VIA_DISPATCHER`
# flag itself. The dispatcher path is now unconditional; the parity
# scenario is structurally meaningless. The 33.z.e grep gate
# (`fase33z_e_parity_gate.rs`) replaces it as the architectural-
# invariant pin (every 33.y.l-deprecated + 33.z.b-flag symbol MUST
# stay deleted from the source tree).
#
# # What this workflow does NOT run
#
# - Real-provider lane (`fase_33x_real_provider.yml`) — opt-in,
#   gated separately on `AXON_RUN_REAL_PROVIDER_TEST` variable.
# - Other Fase 30/31/32 + 33.a-i + 33.x + 33.y family tests —
#   covered by their dedicated workflows.

name: Fase 33.z — Dispatcher production wiring

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  diagnostic-anchor:
    name: 33.z.a — production-path diagnostic anchor (forensic baseline pin)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.z.a — diagnostic anchor (10 tests)
        run: |
          cd axon-rs
          cargo test --test fase33z_dispatcher_production_diagnostic -- --nocapture

  default-on-tool-call:
    name: 33.z.c — default-on dispatcher path + axon.tool_call SSE (D2 + D5)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.z.c — dispatcher default-on + tool_call wire emission
        run: |
          cd axon-rs
          cargo test --test fase33z_c_default_on_and_tool_call -- --nocapture

  parity-corpus:
    name: 33.z.d — 50-fixture sync↔async parity drift gate (D7 + D9)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.z.d — parity corpus drift gate (5 verticals × 10 fixtures)
        run: |
          cd axon-rs
          cargo test --test fase33z_d_parity_corpus -- --nocapture

  legacy-retirement-grep:
    name: 33.z.e — legacy retirement grep parity gate (D1 + D8)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.z.e — 9 retired symbols MUST stay deleted + FallbackMode pinned to 3
        run: |
          cd axon-rs
          cargo test --test fase33z_e_parity_gate -- --nocapture

  cross-stack-python-parity:
    name: 33.z.f — cross-stack Python↔Rust dispatcher drift gate (D10 + D11)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install axon-lang Python side + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-asyncio pytest-cov hypothesis
      - name: 33.z.f — cross-stack drift gate (45-slug catalog + 50-corpus IR compilation parity + canonical Step semantic + forensic parser-gap catalog)
        run: |
          python -m pytest tests/test_fase33z_f_cross_stack_dispatcher_parity.py -v

  production-fuzz:
    name: 33.z.g — D12 production-grade fuzz (5 100 LCG iters across 16 tests)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs
      - name: 33.z.g — production hot path totality + cancel-depth + tool-call zero-emission + parity determinism
        run: |
          cd axon-rs
          cargo test --test fase33z_production_fuzz -- --nocapture

  # Final aggregator — depends on every lane above so the master
  # CI status check (the green-tick that gates PR merge) is a
  # single-source-of-truth for the 33.z cycle's contract.
  summary:
    name: 33.z cycle — all lanes pass
    runs-on: ubuntu-latest
    needs:
      - diagnostic-anchor
      - default-on-tool-call
      - parity-corpus
      - legacy-retirement-grep
      - cross-stack-python-parity
      - production-fuzz
    steps:
      - name: 33.z cycle summary
        run: |
          echo "🎉 Fase 33.z cycle CI: ALL 6 LANES GREEN."
          echo ""
          echo "Contract honored (post-33.z.e architectural state):"
          echo "  D1 single hot path     — dispatcher unconditional in server_execute_streaming"
          echo "  D2 W002 unreachable    — UnsupportedFlowShape variant deleted; FallbackMode pinned to 3"
          echo "  D3 cancel propagation  — 5 100-iter fuzz spans orchestration depth 1-5 × pre-cancel/live"
          echo "  D4 wire byte-compat    — canonical Step preserves 1-token (stub) + terminal complete"
          echo "  D5 axon.tool_call SSE  — closed-catalog wire event family; stub backend → zero emissions"
          echo "  D7 sync↔async parity  — 50-fixture corpus × 5-repeat determinism stress green"
          echo "  D8 legacy retirement   — 9 deprecated symbols grep-gated; FallbackMode catalog pinned"
          echo "  D9 wire byte-compat    — algebraic-effect → wire bridge preserved across retirement"
          echo "  D10 cross-stack        — Python↔Rust IR slug catalog + 33.z.d corpus compilation parity"
          echo "  D11 closed-catalog     — 45 Rust slugs + 3 Python overrides + 1 Rust-only + 3-category"
          echo "                            parser-gap catalog with exact cardinality discipline"
          echo "  D12 production-fuzz    — 5 100 deterministic LCG iters / 16 tests / 0.30s runtime"
          echo ""
          echo "Combined with the 33.y CI workflow (fase_33y_dispatcher.yml), the 33.y + 33.z"
          echo "contract is fully observable on every push + PR — the production hot path is"
          echo "structurally complete (45/45 IRFlowNode variants graduated AND unified into a"
          echo "single dispatcher invocation in the SSE producer)."
