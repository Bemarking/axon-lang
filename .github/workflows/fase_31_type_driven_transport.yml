name: Fase 31 — Type-Driven Wire Inference

# §Fase 31.g — Dedicated CI workflow exercising the cross-stack
# Type-Driven Wire Inference contract on every PR + master push.
#
# Four lanes run in parallel:
#
#   1. python-type-checker   — Fase 31.b inference + 31.c warning
#                               + 31.f flag-surface tests +
#                               31.g D12 fuzz (~2250 mutated inputs)
#   2. rust-frontend-mirror  — Fase 31.b drift gate + 31.c warning
#                               mirror + 31.g D12 fuzz on the
#                               inference pass (~3000 inputs);
#                               3-OS matrix
#   3. rust-runtime          — Fase 31.d strict-mode + 31.e
#                               diagnostic header + 31.f flag
#                               surface tests under all 4 flag
#                               states (legacy off / strict on /
#                               D3 sacred / D8 backwards-compat)
#   4. cross-stack-drift     — explicit D7 parity over the shared
#                               corpus `tests/fixtures/fase31_
#                               implicit_transport/corpus.json`
#                               (both stacks against the same JSON)
#
# D7 ratified 2026-05-11 (extends Fase 28 + Fase 30 D7):
# byte-identical implicit_transport inference across Python
# axon-lang + Rust axon-frontend on every corpus entry without the
# `rust_parser_known_gap` flag.
#
# D12 budget extended to Fase 31: 100-bucket × 10-iter deterministic
# fuzz per CI run on the inference pass (never panics, output set
# closed, idempotent).
#
# In addition to ci.yml's full-suite run; the dedicated lanes keep
# the Type-Driven Wire Inference signal visible on PRs that touch
# the inference + warning + runtime + flag-surface modules.

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── 1. Python lane: inference + warning + flag-surface + fuzz ────
  python-type-checker:
    name: Python inference + warning + flag + fuzz (Fase 31)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,tools,server]"

      - name: Run Fase 31.b inference test pack
        run: pytest tests/test_fase31_implicit_transport.py -v --tb=short

      - name: Run Fase 31.c W001 warning test pack
        run: pytest tests/test_fase31_implicit_transport_warning.py -v --tb=short

      - name: Run Fase 31.f CLI flag + env var test pack
        run: pytest tests/test_fase31_flag_surface.py -v --tb=short

      - name: Run Fase 31.g D12 robustness fuzz (~2250 inputs)
        # 100-bucket × 10-iter panic check + closed-set + idempotence.
        # Pinned as a separate step so a fuzz regression is loudly
        # visible in the workflow timeline rather than buried in
        # the broader pack.
        run: pytest tests/test_fase31_implicit_fuzz.py -v --tb=short

  # ── 2. Rust frontend mirror lane: drift gate + warning + fuzz ───
  rust-frontend-mirror:
    name: Rust frontend mirror + drift + fuzz (Fase 31)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-frontend/target
          key: ${{ runner.os }}-cargo-fase31-frontend-${{ hashFiles('axon-frontend/Cargo.lock', 'axon-frontend/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase31-frontend-

      - name: Run Fase 31.b cross-stack drift gate (Rust side)
        working-directory: axon-frontend
        run: cargo test --test fase31_drift_gate -- --nocapture

      - name: Run Fase 31.c W001 warning mirror tests
        working-directory: axon-frontend
        run: cargo test --test fase31_warning -- --nocapture

      - name: Run Fase 31.g D12 robustness fuzz (~3000 inputs)
        working-directory: axon-frontend
        run: cargo test --test fase31_implicit_fuzz -- --nocapture

  # ── 3. Rust runtime lane: strict mode + header + flag surface ───
  rust-runtime:
    name: Rust runtime negotiation + header + flag (Fase 31)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            axon-rs/target
          key: ${{ runner.os }}-cargo-fase31-runtime-${{ hashFiles('axon-rs/Cargo.lock', 'axon-rs/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-fase31-runtime-

      - name: Run Fase 31.d strict-mode negotiation matrix (17 cells)
        working-directory: axon-rs
        run: cargo test --test fase31_strict_mode -- --nocapture

      - name: Run Fase 31.e X-Axon-Stream-Available diagnostic header (15 tests)
        working-directory: axon-rs
        run: cargo test --test fase31_diagnostic_header -- --nocapture

      - name: Run Fase 31.f CLI flag + env var surface (12 tests)
        working-directory: axon-rs
        run: cargo test --test fase31_flag_surface -- --nocapture

      - name: Run Fase 30 integration regression (D8 backwards-compat)
        # The Fase 31 work must NOT regress any Fase 30 behavior
        # when the strict flag is off (D8 absolute backwards-compat).
        # This step pins the contract explicitly in the workflow.
        working-directory: axon-rs
        run: |
          cargo test --test fase30_sse_runtime -- --nocapture
          cargo test --test fase30_negotiation -- --nocapture
          cargo test --test fase30_keepalive -- --nocapture
          cargo test --test fase30_sse_fuzz -- --nocapture

  # ── 4. Cross-stack drift parity (D7) ────────────────────────────
  #
  # Both stacks read the same `tests/fixtures/fase31_implicit_
  # transport/corpus.json` 25-entry corpus. If they ever drift on
  # the inference verdict for a given entry, exactly one lane fails
  # — drift caught at PR-time, not at adopter-bug-report time.
  cross-stack-drift:
    name: Cross-stack drift parity (D7)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install minimal Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Verify corpus.json is valid JSON + has expected shape
        run: |
          python -c "import json; \
                     entries = json.load(open('tests/fixtures/fase31_implicit_transport/corpus.json')); \
                     assert isinstance(entries, list) and len(entries) >= 20, \
                       f'corpus must be a list of >= 20 entries, got {type(entries).__name__} len={len(entries) if isinstance(entries, list) else \"n/a\"}'"

      - name: Run Python corpus drift assertion (D7)
        # The Python pack contains a parametrized class
        # `TestPythonAgainstCorpus` that iterates the corpus and
        # asserts inference output matches each entry's expected.
        run: |
          pytest tests/test_fase31_implicit_transport.py::TestPythonAgainstCorpus \
            -v --tb=short

      - name: Run Rust corpus drift assertion (D7)
        working-directory: axon-frontend
        run: cargo test --test fase31_drift_gate -- --nocapture
