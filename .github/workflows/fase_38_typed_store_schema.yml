name: Fase 38 — Declared & Compile-Time-Typed Store Schema

# §Fase 38.j — Dedicated CI workflow for The Declared & Compile-Time-Typed
# Store Schema (axon-lang v1.38.0). D1-D10 RATIFIED 2026-05-15; this
# workflow is the regression guard for the WHOLE Fase 38 cycle — every
# PR + master push exercises the five sub-surfaces below in parallel.
#
# Fase 38 is the COMPILE-TIME half of the contract the runtime+deploy
# Fase 37.x established. 37.x makes a typed-column store WORK at runtime
# on every pooled session; 38 makes its SHAPE a declared, verifiable,
# compile-time-proven property. Schema drift between an adopter's
# declared columns (form a/b/c) and the live database moves from a
# first-failing `persist` to the deploy itself — axon-T807 fires the
# moment a deploy's declared catalog disagrees with live introspection.
#
# Five parallel lanes:
#
#   1. pure-column-proof — the no-database pure-Rust surface: every
#      compile-time column-proof unit test + the inverted Fase 38
#      diagnostic anchors. The T801/T802/T803/T804 compile-time gates,
#      the Levenshtein composite-suggestion ladder, and the closed
#      15-type catalog (`StoreColumnType`).
#
#   2. manifest-roundtrip — the canonical JSON manifest's parse →
#      canonical-serialize → hand-rolled FIPS 180-4 SHA-256 fixed
#      point + the hash-mismatch surface (axon-T805) + cross-file
#      duplicate-store detection + the 38.i curated multi-store fixture
#      (5 stores, 3 schemas, public/audit/per-tenant) round-tripping
#      byte-identical.
#
#   3. per-tenant-resolution — the form (c) `schema: env:VAR` per-tenant
#      env-var resolution surface. The first-match heuristic for
#      `<env_var>.<store_name>`, the `application_name` Gap-3 stamping
#      (`axon-store/<store>/<namespace>`), and axon-T806's missing-env
#      diagnostic. Pure — no DB needed.
#
#   4. declared-vs-live-drift — the load-bearing 38.j plumbing lane.
#      `axon serve --schemas-dir` flag + deploy_handler manifest
#      loading + `verify_postgres_schemas_with_manifest` end-to-end.
#      The fase38_j_schemas_dir_plumbing pack (6 cases) proves the
#      compile-time-declared schema becomes the authoritative shape
#      at deploy: D5 backwards-compat (no flag = pre-38 behavior),
#      empty/missing dir as no-op, T805 hash-mismatch surfaced as
#      structured 200-OK error with `phase: store_schema_manifest_load`,
#      duplicate-store across files surfaced the same way, and a
#      well-formed manifest threading clean.
#
#   5. d5-zero-regression — the Fase 37.x corpus from the previous
#      cycle, plus the broad Fase 35 cognitive-data-plane corpus,
#      both run without `--schemas-dir`. D5 is ABSOLUTE: an adopter
#      who has not adopted Fase 38 observes ZERO behavior change.
#      Pure (no DB) lane — exercises ~25 000 LCG iters across the
#      Fase 35/37.x fuzz packs without touching Postgres.

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── 1. Pure column-proof — no database ──────────────────────────────
  pure-column-proof:
    name: 38 pure surface — column-proof + diagnostic anchors + 15-type catalog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            axon-rs
            axon-frontend

      - name: Frontend unit tests — store_column_proof + closed type catalog
        working-directory: axon-frontend
        # The pure-Rust compile-time column-proof surface: closed 15-type
        # catalog (`StoreColumnType`), Levenshtein composite suggestion,
        # T801 unknown-column-in-where, T802 type mismatch, T803 persist
        # NOT-NULL omission, T804 unknown-field-in-block. Hot path = the
        # type-checker; zero new crate deps.
        run: cargo test --lib store_column_proof::

      - name: Frontend — Fase 38.a inverted diagnostic anchors
        working-directory: axon-frontend
        # The pre-38 anchor was "no module"; 38.a-h inverted every
        # surface. Anchor is now the regression guard — the public
        # `axon_frontend::store_introspect` API and the 15-type catalog
        # must remain stable.
        run: cargo test --test fase38_a_typed_store_diagnostic -- --nocapture

      - name: Frontend — store_introspect public API
        working-directory: axon-frontend
        # 38.h's pure manifest-builder surface — the public functions
        # consumed by the axon-rs `axon store introspect` CLI. ~26 unit
        # tests in the module; this catches any silent contract
        # regression on the reverse pg_type → StoreColumnType matrix
        # + the OmittedColumn / ColumnDelta / ManifestDiff surfaces.
        run: cargo test --lib store_introspect::

  # ── 2. Manifest round-trip — parse → canonical → SHA-256 → verify ──
  manifest-roundtrip:
    name: 38 manifest — JSON parse → canonical → SHA-256 → hash verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            axon-rs
            axon-frontend

      - name: Frontend — store_schema_manifest unit tests
        working-directory: axon-frontend
        # The pure round-trip surface: parse arbitrary-key-order JSON →
        # canonical serialise (key-sorted, no whitespace) → hand-rolled
        # FIPS 180-4 SHA-256 → verify_content_hash byte-for-byte. Plus
        # the discovery walker (file naming convention) + merge logic
        # (DuplicateStore across files). Zero new crate deps.
        run: cargo test --lib store_schema_manifest::

      - name: Frontend — Fase 38.i curated-manifest integration pack
        working-directory: axon-frontend
        # The 38.i curated 5-store fixture (`public.tenants`,
        # `public.events`, `audit.log`, `tenant_alpha.usage`,
        # `tenant_beta.usage`) exercising the full D-letter ladder
        # against a single coherent manifest. 21 tests across 6
        # sections A-F: parse + identity, per-tenant first-match,
        # mixed declaration forms, every D2 code, D5 absolute,
        # Levenshtein boundary, 38.h smoke.
        run: cargo test --test fase38_i_integration -- --nocapture

      - name: Frontend — Fase 38.i deterministic property/fuzz pack
        working-directory: axon-frontend
        # ~6 200 LCG iters across 3 surfaces (mirroring the 35.k /
        # 32.i / 33.g / 37.x.i convention):
        #   * Surface A — `Manifest::parse_json` totality (2 000 iters)
        #   * Surface B — `check_filter` totality (2 000 + 200 empty
        #     companion)
        #   * Surface C — `canonical_serialize` fixed point
        #     (2 000 + 400 hash-differs companion)
        # Numerical Recipes 64-bit LCG; deterministic, no externals.
        run: cargo test --test fase38_i_property_fuzz -- --nocapture

  # ── 3. Per-tenant resolution — env-var first-match + app_name stamp ─
  per-tenant-resolution:
    name: 38 per-tenant — env-var first-match + application_name stamp
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            axon-rs
            axon-frontend

      - name: Backend — registry + postgres_backend per-tenant unit tests
        working-directory: axon-rs
        # The store::registry module ships the `declared_columns_for`
        # helper that resolves form (a) inline / form (b) manifest-ref /
        # form (c) per-tenant env-var. The store::postgres_backend
        # module ships `application_name_for_with_namespace` (Gap-3) +
        # `connect_named_with_namespace`. Both surfaces are pure; the
        # runtime DSN is mocked through the constructor.
        run: cargo test --lib store::registry:: store::postgres_backend::

      - name: Backend — StoreError T806 / T807 message contracts
        working-directory: axon-rs
        # T806 MissingPerTenantSchemaEnv + T807 DeclaredVsLiveDrift have
        # explicit Display impls with cross-stack-stable language. This
        # lane is the contract gate for the operator-visible diagnostic
        # text; a phrasing drift here is a regression.
        run: cargo test --lib store::registry::tests
        # NOTE: store::registry::tests covers the report-shape +
        # T807 drift + T806 missing-env surfaces in the same module-
        # internal tests block.

  # ── 4. Declared-vs-live drift — the 38.j plumbing lane ──────────────
  declared-vs-live-drift:
    name: 38.j plumbing — --schemas-dir → deploy_handler → T807 fires
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            axon-rs
            axon-frontend

      - name: Fase 38.j — schemas_dir plumbing end-to-end (6 cases)
        working-directory: axon-rs
        # The load-bearing wire: `axon serve --schemas-dir <path>` →
        # ServerConfig.schemas_dir → deploy_handler ->
        # `load_and_merge_manifests` →
        # `verify_postgres_schemas_with_manifest(Some(&m))`. Six
        # infra-free cases exercise the full surface:
        #   §1  D5 — no schemas_dir = pre-38 behavior verbatim
        #   §2  empty dir = clean no-op
        #   §3  non-existent dir = clean no-op
        #   §4  T805 hash mismatch → structured 200-OK
        #       (`phase: store_schema_manifest_load`, `d_letter: D3+D8`,
        #        `schemas_dir` echoed)
        #   §5  duplicate-store across files → same structured shape;
        #       offending store named in the error message
        #   §6  well-formed manifest threads clean
        run: cargo test --test fase38_j_schemas_dir_plumbing -- --nocapture

  # ── 5. D5 zero-regression — Fase 35/37.x corpora through 38 ─────────
  d5-zero-regression:
    name: 38 D5 zero-regression — Fase 35/37.x corpora hold post-38
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: axon-rs

      - name: D5 — Fase 37.x typed-I/O property/fuzz pack
        working-directory: axon-rs
        # The Fase 37.x pure fuzz pack: ~7 500 LCG iters across
        # resolve_from_rows totality (D1), build_pg_where totality +
        # injection-resistance + 37.x.e `::text` invariant (D4), and
        # is_schema_drift_sqlstate closed-set (D9). D5 absolute: every
        # invariant Fase 37.x established holds post-38.
        run: cargo test --test fase37x_i_property_fuzz -- --nocapture

      - name: D5 — Fase 35 fuzz robustness pack
        working-directory: axon-rs
        # ~18 000 LCG iters across 6 surfaces (filter, classifiers,
        # epistemic, audit chain, store resolution, SQL builders).
        # D5 absolute on the broader cognitive-data-plane corpus.
        run: cargo test --test fase35_fuzz -- --nocapture

      - name: D5 — Fase 32 dynamic-route plumbing
        working-directory: axon-rs
        # The dynamic-route plumbing under which Fase 38's deploy_handler
        # change lives. Without `--schemas-dir`, every Fase 32 invariant
        # (D2 collision detection, D4 body validation, D5 output
        # validation, D6 transport classification, D7 idempotency,
        # D8 auth-scope, D9 replay-token) must hold byte-identical.
        run: |
          cargo test --test fase32_routes_drift -- --nocapture
          cargo test --test fase32_auth_scope -- --nocapture
          cargo test --test fase32_replay_binding -- --nocapture

      - name: D5 — Fase 33.c live event forwarding
        working-directory: axon-rs
        # SSE wire-byte-compat invariant — Fase 38 touches deploy
        # handler but the SSE producer/consumer path is untouched.
        # Re-running this proves no inadvertent regression on the SSE
        # transport invariants.
        run: cargo test --test fase33_c_live_event_forwarding -- --nocapture

  # ── Cycle summary ───────────────────────────────────────────────────
  fase-38-summary:
    name: Fase 38 cycle CI summary
    runs-on: ubuntu-latest
    needs:
      - pure-column-proof
      - manifest-roundtrip
      - per-tenant-resolution
      - declared-vs-live-drift
      - d5-zero-regression
    steps:
      - name: Fase 38 cycle CI
        run: |
          echo "🎉 Fase 38 cycle CI — ALL 5 LANES GREEN."
          echo ""
          echo "The Declared & Compile-Time-Typed Store Schema, proven"
          echo "end to end:"
          echo "  D1   grammar — three closed schema: declaration forms"
          echo "       (inline / manifest-ref / per-tenant env-var)"
          echo "  D2   axon check proof — every column-in-where, every"
          echo "       field-in-block, every persist NOT-NULL omission"
          echo "       is a compile-time error (T801-T804) with"
          echo "       Levenshtein composite suggestions"
          echo "  D3   per-tenant env-var — first-match resolution +"
          echo "       application_name Gap-3 stamping"
          echo "  D4   canonical JSON manifest — hand-rolled FIPS 180-4"
          echo "       SHA-256 + canonical (key-sorted, no whitespace)"
          echo "       emitter; round-trip byte-identical"
          echo "  D5   ABSOLUTE backwards-compat — no --schemas-dir means"
          echo "       pre-38 behavior verbatim (this workflow's D5 lane)"
          echo "  D6   honest failure — Levenshtein \"Did you mean column"
          echo "       \`X\` (Type)?\" composite suggestions"
          echo "  D7   dedicated CI lane (THIS workflow's 5 lanes)"
          echo "  D8   declared-vs-live drift — T807 fires at deploy when"
          echo "       declared columns disagree with live introspection"
          echo "       (lane 4 — the 38.j plumbing pack)"
          echo "  D9   cross-stack parity — Python informed but not"
          echo "       authoritative; Rust+C is the canonical surface"
          echo "  D10  introspect CLI — \`axon store introspect\` is the"
          echo "       reverse of \`axon check\` — live → manifest with"
          echo "       honest pg_type omissions"
          echo ""
          echo "axon-lang v1.38.0 — the typed-column store's SHAPE is now"
          echo "a declared, verifiable, compile-time-proven property."
