# §Fase 37.x.i — Local transaction-mode pooler fixture.
#
# Reproduces the CI lane `pgbouncer-transaction-mode` (in
# .github/workflows/fase_35_axonstore.yml) on a developer machine, so an
# adopter can:
#
#   1. Reproduce the smoke-15 chain that drove Fase 37.x's creation —
#      the canonical "retrieve, retrieve, retrieve, persist" agent flow
#      against a uuid-PK table in a non-default `search_path` schema,
#      behind a transaction-mode pooler.
#   2. Run the axon-rs tests directly against this stack:
#        AXON_TEST_DATABASE_URL="postgresql://axon:axon@localhost:6432/axon_store_test" \
#          cargo test --test fase37x_i_pgbouncer_integration -- --nocapture
#      and similarly for `fase35_l_postgres_integration` (the broad D5
#      regression guard) and `fase37x_a_pooler_coherent_diagnostic`.
#
# `default_pool_size: 5` is the SAME value the CI lane uses — ≪ the
# parallel test count, so cross-session multiplexing is FORCED. The pooler
# `auth_type` is `scram-sha-256`, the modern Postgres default.
#
# Bring it up:           docker compose -f docker-compose.yml up -d
# Tear it down:          docker compose -f docker-compose.yml down -v
# Tail PgBouncer logs:   docker compose -f docker-compose.yml logs -f pgbouncer

version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: axon
      POSTGRES_PASSWORD: axon
      POSTGRES_DB: axon_store_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axon -d axon_store_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    # No volume: a transient fixture for tests. An `up -d` after `down -v`
    # is a clean slate.

  pgbouncer:
    image: edoburu/pgbouncer:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_USER: axon
      DB_PASSWORD: axon
      DB_NAME: axon_store_test
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      # Deliberately small server pool so cross-session multiplexing —
      # the exact pre-37.x failure trigger — actually happens.
      DEFAULT_POOL_SIZE: "5"
      MAX_CLIENT_CONN: "200"
      LISTEN_PORT: "6432"
    ports:
      - "6432:6432"
