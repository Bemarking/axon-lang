[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# ──────────────────────────────────────────────────────────────────
# Project metadata
# ──────────────────────────────────────────────────────────────────
[project]
name = "axon-enterprise"
version = "1.0.0"
description = "Axon Enterprise Edition — RBAC, SSO, Audit Logging, and Usage Metering"
readme = "README.md"
license = "LicenseRef-Proprietary"
requires-python = ">=3.12"
authors = [
    { name = "Ricardo Velit", email = "ricardo@bemarking.com.co" },
    { name = "Bemarking AI S.A.S." },
]
keywords = [
    "ai",
    "llm",
    "enterprise",
    "rbac",
    "sso",
    "audit",
    "metering",
]

classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: Other/Proprietary License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

# ──────────────────────────────────────────────────────────────────
# Dependencies
# ──────────────────────────────────────────────────────────────────
dependencies = [
    # Core (from axon-lang)
    # v1.3.1 required: Fases 1-5 Cognitive I/O primitives (v1.1.0),
    # Fases 6-7.x ESK + audit engine (v1.2.0), Fase 8 native Rust
    # runtime + byte-identical parity + CLI parity + binary dist
    # (v1.3.0), Fase 9 UI cognitiva core (v1.3.1, renderers
    # deferred to v1.4.x). Tag `v1.3.1` on axon-lang, publish PyPI,
    # then `pip install --upgrade axon-enterprise`.
    "axon-lang>=1.3.1",

    # Database & ORM
    "sqlalchemy>=2.0",
    "asyncpg>=0.29",

    # Authentication & SSO
    "python3-saml>=1.16.0",
    "authlib>=1.3.0",

    # Cryptography
    "cryptography>=42.0.0",
    "PyJWT>=2.8.0",

    # Observability
    "prometheus-client>=0.20.0",
    "opentelemetry-api>=1.25.0",
    "opentelemetry-sdk>=1.25.0",

    # Web framework (already in axon-lang)
    "starlette>=0.41",
    "uvicorn[standard]>=0.32",

    # Utilities
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
]

# ──────────────────────────────────────────────────────────────────
# Optional dependencies
# ──────────────────────────────────────────────────────────────────
[project.optional-dependencies]
# AWS integrations
aws = [
    "boto3>=1.34",
]

# GCP integrations
gcp = [
    "google-cloud-storage>=2.14",
    "google-cloud-kms>=2.19",
]

# Datadog monitoring
datadog = [
    "datadog>=0.49.0",
]

# Stripe billing integration
stripe = [
    "stripe>=9.0.0",
]

# Development & testing
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "pytest-mock>=3.14",
    "ruff>=0.8",
    "black>=24.1",
    "mypy>=1.8",
]

all = [
    "axon-enterprise[aws,gcp,datadog,stripe,dev]",
]

# ──────────────────────────────────────────────────────────────────
# Pytest configuration
# ──────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks integration tests",
    "security: marks security-related tests",
]

# ──────────────────────────────────────────────────────────────────
# Ruff (linter + formatter)
# ──────────────────────────────────────────────────────────────────
[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "SIM",  # flake8-simplify
    "RUF",  # ruff-specific rules
    "S",    # flake8-bandit (security)
]
ignore = [
    "E501",   # line length handled by formatter
    "B008",   # do not perform function calls in argument defaults
    "S101",   # use of assert allowed in tests
]

[tool.ruff.lint.isort]
known-first-party = ["axon_enterprise"]
