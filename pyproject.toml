name = "axon-enterprise"
version = "1.20.0"
description = "Axon Enterprise — RBAC, SSO, Audit, Metering, Compliance (Fase 10); Replay Tokens + Cognitive State (Fase 11); Primitives endpoint (v1.2.1); v1.3.0 integrated axon-lang 1.5.1 + Rust TypedEventBus (Fase 13.f.2); v1.4.0 integrated axon-lang 1.7.0 closing 13.j/k/l (typed channels end-to-end); v1.5.0 integrates axon-lang 1.9.0 — Fase 14 lossless lexing complete; v1.5.1 picks up axon-lang 1.9.1 parser fix for compound qualifier slugs (Fase 11.c/11.e); v1.5.2 integrates axon-lang 1.10.0 — Fase 15 lambda apply runtime wiring (Phase-2 lowering + Python and Rust dispatchers + Theorem 5.1 runtime guard); v1.6.0 integrates axon-lang 1.11.0 + ships the Fase 16 production-grade Daemon Supervisor: new axon_enterprise.supervisor package with 12 modules implementing telemetry (OTel + Prometheus + structlog), state persistence (Replay tokens + Cognitive States), on_stuck dispatcher (hibernate/escalate/retry/forge/noop), decorrelated-jitter exponential backoff, liveness probes (heartbeat/watchdog/custom), hierarchical supervision tree, audit-chain integration (HMAC-SHA256 + Merkle-chained per tenant), multi-tenant restart budgets, compliance-aware restart hooks (legal-basis re-validation), and distributed leader election (Redis Redlock); v1.7.0 integrates axon-lang 1.15.0 + ships the Fase 20 vertical Shield R&D layer: new axon_enterprise.shield package with healthcare (HIPAA Safe Harbor PHI patterns + Security Rule judge prompt calibrated against 45 CFR §§164.308-.314 + GDPR Art. 25), legal (attorney-client privilege + work-product doctrine + FRE 408 settlement-comm patterns + judge calibrated against FRE 502 / Upjohn / Hickman / ABA Rule 1.6), and fintech (Luhn-validated PAN + mod-97-validated IBAN + SWIFT BIC + structured-transaction smurf signatures + OFAC SDN signals + AML judge calibrated against BSA / OFAC / MiFID II / GDPR Art. 6(1)(c)) verticals registering against axon-lang's ShieldScannerRegistry under explicit vertical strategy aliases (`hipaa` / `legal` / `